<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IND Live Match</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:url("images/ind-vs-wi-2026.jpg") no-repeat center center fixed;
  background-size:cover;
  position:relative;
}

body::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.7);
}

.live-box{
  position:relative;
  background:rgba(0,0,0,0.75);
  padding:50px 70px;
  border-radius:25px;
  text-align:center;
  color:#fff;
  min-width:350px;
  box-shadow:0 0 50px rgba(0,0,0,0.8);
}

h1{
  font-size:26px;
  margin-bottom:25px;
}

.score{
  font-size:24px;
  font-weight:bold;
  margin:12px 0;
}

.live{
  margin-top:20px;
  display:inline-block;
  padding:10px 25px;
  background:#ff0000;
  border-radius:40px;
  font-size:14px;
  font-weight:bold;
  letter-spacing:1px;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{opacity:1;}
  50%{opacity:0.5;}
  100%{opacity:1;}
}
</style>
</head>

<body>

<div class="live-box">
  <h1>India Live Match</h1>
  <div class="score" id="score1">Loading score...</div>
  <div class="score" id="score2"></div>
  <div class="live">LIVE</div>
</div>

<script>
async function loadScore(){
  try{
    const res = await fetch("/api/score");
    const json = await res.json();

    if(!json.data){
      document.getElementById("score1").innerHTML="No live match";
      return;
    }

    // India wala match find karega automatically
    const match = json.data.find(m =>
      m.name && m.name.toLowerCase().includes("india")
    );

    if(!match){
      document.getElementById("score1").innerHTML="India match not live";
      return;
    }

    if(!match.score || match.score.length < 1){
      document.getElementById("score1").innerHTML="Score updating...";
      return;
    }

    const t1 = match.score[0];
    const t2 = match.score[1];

    document.getElementById("score1").innerHTML =
      match.teams[0] + " " + t1.r + "/" + t1.w + " (" + t1.o + ")";

    if(t2){
      document.getElementById("score2").innerHTML =
        match.teams[1] + " " + t2.r + "/" + t2.w + " (" + t2.o + ")";
    }

  }catch(e){
    document.getElementById("score1").innerHTML="Error loading score";
  }
}

loadScore();
setInterval(loadScore,15000);
</script>

</body>
</html>
