<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bihari Battle League | User Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #0b1120 100%);
            min-height: 100vh;
            padding: 16px;
            color: #fff;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(12, 20, 30, 0.65);
            backdrop-filter: blur(3px);
            border-radius: 40px;
            padding: 20px 18px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .logo h1 {
            font-size: 1.6rem;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo p {
            font-size: 0.7rem;
            color: #7e8c9e;
        }

        .user-badge {
            background: #1e2a3e;
            padding: 8px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .wallet-card {
            background: linear-gradient(120deg, #0f212e, #07121c);
            border-radius: 28px;
            padding: 16px 20px;
            margin-bottom: 24px;
            border: 1px solid #2c3e50;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .balance {
            font-size: 2rem;
            font-weight: 800;
            color: #facc15;
        }

        .btn {
            border: none;
            background: linear-gradient(95deg, #1e3c72, #2b4c7c);
            padding: 10px 20px;
            border-radius: 60px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.85rem;
        }

        .btn-primary {
            background: linear-gradient(95deg, #2d9cdb, #236bf0);
            box-shadow: 0 5px 12px rgba(45,156,219,0.3);
        }

        .tournament-card {
            background: #0f1825;
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 16px;
            border-left: 5px solid #2d9cdb;
            transition: transform 0.2s;
        }

        .tournament-card:hover {
            transform: translateY(-2px);
        }

        .status-badge {
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 30px;
            background: #2c3e50;
        }

        .status-Live {
            background: #10b981;
            color: white;
        }

        .status-Upcoming {
            background: #f59e0b;
        }

        .status-Completed {
            background: #6b7280;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .mt-3 {
            margin-top: 12px;
        }

        .room-box {
            background: #00000066;
            padding: 10px;
            border-radius: 16px;
            font-family: monospace;
            font-size: 0.9rem;
            margin-top: 10px;
            border: 1px solid #2d9cdb;
        }

        input {
            background: #0f1a24;
            border: 1px solid #2c3e50;
            padding: 12px;
            border-radius: 30px;
            color: white;
            width: 100%;
            margin-bottom: 12px;
            outline: none;
        }

        input:focus {
            border-color: #2d9cdb;
        }

        .tab-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 1px solid #1f2a3a;
            padding-bottom: 8px;
            overflow-x: auto;
        }

        .tab {
            padding: 8px 20px;
            border-radius: 30px;
            background: #0f1825;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .tab.active {
            background: #2d9cdb;
        }

        .toast-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            padding: 12px 24px;
            border-radius: 60px;
            z-index: 999;
            font-size: 0.8rem;
            box-shadow: 0 5px 15px black;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateX(-50%) translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        .transaction-item {
            background: #0f1825;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .leaderboard-item {
            background: #0f1825;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .rank-1 {
            background: linear-gradient(95deg, #f59e0b, #d97706);
        }

        .rank-2 {
            background: linear-gradient(95deg, #94a3b8, #64748b);
        }

        .rank-3 {
            background: linear-gradient(95deg, #cd7b4e, #b45309);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #7e8c9e;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        @media (max-width: 500px) {
            .app-container {
                padding: 16px;
            }
            .btn {
                padding: 8px 14px;
            }
        }
    </style>
</head>
<body>
<div id="appRoot" class="app-container"></div>

<script type="module">
const firebaseConfig = {
  apiKey: "AIzaSyDiHxA8fXHVTAKFSU1UMobZMY_Kw7612fw",
  authDomain: "tournament-app-b77c0.firebaseapp.com",
  databaseURL: "https://tournament-app-b77c0-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "tournament-app-b77c0",
  storageBucket: "tournament-app-b77c0.firebasestorage.app",
  messagingSenderId: "925200484535",
  appId: "1:925200484535:web:c15c87fcecb5e793bca532"
};    
    // IMPORTANT: Replace the above config with your actual Firebase project settings
    
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, onSnapshot, addDoc, serverTimestamp, increment, orderBy, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    
    let currentUser = null;
    let tournamentsUnsub = null;
    let myMatchesUnsub = null;
    let leaderboardUnsub = null;
    let transactionsUnsub = null;
    
    const root = document.getElementById('appRoot');
    
    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.innerText = msg;
        toast.style.background = isError ? '#dc2626' : '#2d9cdb';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }
    
    function render() {
        if (!currentUser) {
            renderAuthScreen();
        } else {
            renderUserDashboard();
        }
    }
    function renderAuthScreen() {
        root.innerHTML = `
            <div class="header">
                <div class="logo">
                    <h1>🔥 BIHARI BATTLE LEAGUE</h1>
                    <p>Free Fire Esports Tournament</p>
                </div>
            </div>
            <div style="background:#0f1825; border-radius:32px; padding:24px;">
                <h3 style="margin-bottom:20px;">⚡ Welcome to Battle Arena</h3>
                <input type="email" id="authEmail" placeholder="Email Address" />
                <input type="password" id="authPass" placeholder="Password" />
                <button class="btn btn-primary" id="loginBtn" style="width:100%; margin-bottom:10px;">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
                <button class="btn" id="signupBtn" style="width:100%;">
                    <i class="fas fa-user-plus"></i> Create New Account
                </button>
                <div style="margin-top:20px; text-align:center; font-size:12px; color:#7e8c9e;">
                    <i class="fas fa-gamepad"></i> Join tournaments & win prizes!
                </div>
            </div>
        `;
        
        document.getElementById('loginBtn')?.addEventListener('click', async () => {
            const email = document.getElementById('authEmail').value;
            const pwd = document.getElementById('authPass').value;
            if (!email || !pwd) {
                showToast("Please enter email and password", true);
                return;
            }
            try {
                await signInWithEmailAndPassword(auth, email, pwd);
                showToast("Welcome back, warrior! 🎮");
            } catch(e) {
                if (e.code === 'auth/user-not-found') {
                    showToast("User not found. Please sign up first!", true);
                } else {
                    showToast(e.message, true);
                }
            }
        });
        
        document.getElementById('signupBtn')?.addEventListener('click', async () => {
            const email = document.getElementById('authEmail').value;
            const pwd = document.getElementById('authPass').value;
            if (!email || !pwd) {
                showToast("Please enter email and password", true);
                return;
            }
            if (pwd.length < 6) {
                showToast("Password should be at least 6 characters", true);
                return;
            }
            try {
                const cred = await createUserWithEmailAndPassword(auth, email, pwd);
                const userRef = doc(db, "users", cred.user.uid);
                const snap = await getDoc(userRef);
                if (!snap.exists()) {
                    await setDoc(userRef, {
                        name: email.split('@')[0],
                        wallet: 500,
                        email: email,
                        createdAt: serverTimestamp()
                    });
                }
                showToast("Account created! +500 coins bonus 💰");
            } catch(e) {
                if (e.code === 'auth/email-already-in-use') {
                    showToast("Email already registered. Please login!", true);
                } else {
                    showToast(e.message, true);
                }
            }
        });
    }
    
    async function renderUserDashboard() {
        if (!currentUser) return;
        const uid = currentUser.uid;
        const userDocRef = doc(db, "users", uid);
        
        let walletBalance = 0;
        
        const updateWalletDisplay = async () => {
            const snap = await getDoc(userDocRef);
            if (snap.exists()) {
                walletBalance = snap.data().wallet || 0;
                const walletSpan = document.getElementById('userWalletAmount');
                if (walletSpan) walletSpan.innerText = walletBalance;
            }
        };
        await updateWalletDisplay();
        
        // Tournaments List - Real-time updates
        const tournamentsQuery = query(collection(db, "tournaments"), orderBy("time", "desc"));
        if (tournamentsUnsub) tournamentsUnsub();
        tournamentsUnsub = onSnapshot(tournamentsQuery, (snapshot) => {
            const tournamentListDiv = document.getElementById('tournamentList');
            if (tournamentListDiv) {
                if (snapshot.empty) {
                    tournamentListDiv.innerHTML = '<div style="text-align:center; padding:40px;">No tournaments available</div>';
                    return;
                }
                
                let html = '';
                snapshot.forEach(docSnap => {
                    const t = docSnap.data();
                    const id = docSnap.id;
                    const slotsFilled = t.players ? Object.keys(t.players).length : 0;
                    const totalSlots = t.maxPlayers || 10;
                    const status = t.status || 'Upcoming';
                    const isJoined = t.players && t.players[uid];
                    
                    html += `
                        <div class="tournament-card">
                            <div class="flex-between">
                                <h4><i class="fas fa-trophy"></i> ${t.title || 'Free Fire Battle'}</h4>
                                <span class="status-badge status-${status}">${status}</span>
                            </div>
                            <div class="flex-between mt-3">
                                <span>💰 Entry: ₹${t.fee}</span>
                                <span>🏆 Prize: ₹${t.prize}</span>
                            </div>
                            <div>⏰ ${t.time}</div>
                            <div>👥 Players: ${slotsFilled}/${totalSlots}</div>
                            ${status === 'Live' && t.roomId ? `
                                <div class="room-box">
                                    <i class="fas fa-gamepad"></i> <strong>Room ID:</strong> ${t.roomId}<br>
                                    <i class="fas fa-key"></i> <strong>Password:</strong> ${t.password || 'N/A'}
                                </div>
                            ` : ''}
                            <div class="mt-3">
                                ${status === 'Upcoming' && !isJoined && slotsFilled < totalSlots ? 
                                    `<button class="btn btn-primary joinMatchBtn" data-id="${id}" data-fee="${t.fee}" style="width:100%;">Join Match ➕</button>` : 
                                    status === 'Upcoming' && isJoined ? 
                                    `<button class="btn" disabled style="width:100%;">✓ Already Joined</button>` : 
                                    status === 'Live' && isJoined && !t.roomId ?
                                    `<button class="btn" disabled style="width:100%;">⏳ Waiting for Room ID</button>` : ''}
                            </div>
                        </div>
                    `;
                });
                tournamentListDiv.innerHTML = html;
                
                // Attach join button events
                document.querySelectorAll('.joinMatchBtn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const matchId = btn.dataset.id;
                        const fee = parseInt(btn.dataset.fee);
                        const userData = await getDoc(userDocRef);
                        const currentWallet = userData.data()?.wallet || 0;
                        
                        if (currentWallet < fee) {
                            showToast("Insufficient balance! Add money first.", true);
                            return;
                        }
                        
                        const matchRef = doc(db, "tournaments", matchId);
                        const matchSnap = await getDoc(matchRef);
                        const players = matchSnap.data()?.players || {};
                        
                        if (players[uid]) {
                            showToast("You've already joined this match!", true);
                            return;
                        }
                        
                        if (Object.keys(players).length >= (matchSnap.data()?.maxPlayers || 10)) {
                            showToast("Match is full!", true);
                            return;
                        }
                        
                        try {
                            await updateDoc(matchRef, { [`players.${uid}`]: true });
                            await updateDoc(userDocRef, { wallet: increment(-fee) });
                            await addDoc(collection(db, "transactions"), {
                                uid: uid,
                                type: "joined_tournament",
                                amount: fee,
                                matchId: matchId,
                                timestamp: serverTimestamp()
                            });
                            showToast(`Successfully joined ${matchSnap.data()?.title}! -₹${fee}`);
                            updateWalletDisplay();
                        } catch(error) {
                            showToast("Failed to join match", true);
                        }
                    });
                });
            }
        });
        
        // My Matches - Real-time updates with room details
        const myMatchesQuery = query(collection(db, "tournaments"));
        if (myMatchesUnsub) myMatchesUnsub();
        myMatchesUnsub = onSnapshot(myMatchesQuery, async (snapshot) => {
            const myMatchesDiv = document.getElementById('myMatchesList');
            if (myMatchesDiv) {
                let html = '';
                let hasMatches = false;
                
                for (const docSnap of snapshot.docs) {
                    const t = docSnap.data();
                    if (t.players && t.players[uid]) {
                        hasMatches = true;
                        html += `
                            <div class="tournament-card">
                                <div class="flex-between">
                                    <span><b><i class="fas fa-gamepad"></i> ${t.title}</b></span>
                                    <span class="status-badge status-${t.status}">${t.status}</span>
                                </div>
                                <div>⏰ ${t.time}</div>
                                <div>💰 Entry: ₹${t.fee} | Prize: ₹${t.prize}</div>
                                ${t.status === 'Live' && t.roomId ? `
                                    <div class="room-box">
                                        <i class="fas fa-door-open"></i> <strong>Room ID:</strong> ${t.roomId}<br>
                                        <i class="fas fa-lock"></i> <strong>Password:</strong> ${t.password || 'No password'}
                                    </div>
                                ` : t.status === 'Live' && !t.roomId ? `
                                    <div class="room-box" style="background:#f59e0b20;">
                                        <i class="fas fa-hourglass-half"></i> Room details will appear when match starts
                                    </div>
                                ` : t.status === 'Completed' ? `
                                    <div class="room-box" style="background:#6b728020;">
                                        <i class="fas fa-check-circle"></i> Match completed. Check leaderboard for results!
                                    </div>
                                ` : ''}
                            </div>
                        `;
                    }
                }
                myMatchesDiv.innerHTML = hasMatches ? html : '<div style="text-align:center; padding:40px;">No matches joined yet</div>';
            }
        });
        
        // Leaderboard - Real-time updates
        const leaderboardQuery = query(collection(db, "leaderboard"), orderBy("points", "desc"));
        if (leaderboardUnsub) leaderboardUnsub();
        leaderboardUnsub = onSnapshot(leaderboardQuery, (snapshot) => {
            const leaderboardDiv = document.getElementById('leaderboardList');
            if (leaderboardDiv) {
                if (snapshot.empty) {
                    leaderboardDiv.innerHTML = '<div style="text-align:center; padding:40px;">No rankings yet</div>';
                    return;
                }
                
                let rank = 1;
                let html = '';
                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    let rankClass = '';
                    if (rank === 1) rankClass = 'rank-1';
                    else if (rank === 2) rankClass = 'rank-2';
                    else if (rank === 3) rankClass = 'rank-3';
                    
                    html += `
                        <div class="leaderboard-item ${rankClass}">
                            <div><span style="font-weight:bold;">#${rank}</span> ${data.name}</div>
                            <div><i class="fas fa-fire"></i> ${data.points} pts</div>
                        </div>
                    `;
                    rank++;
                });
                leaderboardDiv.innerHTML = html;
            }
        });
        
        // Transaction History - Real-time updates
        const transactionsQuery = query(collection(db, "transactions"), where("uid", "==", uid), orderBy("timestamp", "desc"));
        if (transactionsUnsub) transactionsUnsub();
        transactionsUnsub = onSnapshot(transactionsQuery, (snapshot) => {
            const historyDiv = document.getElementById('transactionHistory');
            if (historyDiv) {
                if (snapshot.empty) {
                    historyDiv.innerHTML = '<div style="text-align:center; padding:40px;">No transactions yet</div>';
                    return;
                }
                
                let html = '';
                snapshot.forEach(docSnap => {
                    const t = docSnap.data();
                    const date = t.timestamp ? new Date(t.timestamp.toDate()).toLocaleString() : 'Just now';
                    const icon = t.type === 'joined_tournament' ? 'fa-gamepad' : 'fa-plus-circle';
                    const color = t.type === 'joined_tournament' ? '#f97316' : '#10b981';
                    html += `
                        <div class="transaction-item">
                            <div><i class="fas ${icon}" style="color:${color};"></i> ${t.type.replace('_', ' ')}</div>
                            <div>₹${t.amount}</div>
                            <div style="font-size:11px; color:#7e8c9e;">${date}</div>
                        </div>
                    `;
                });
                historyDiv.innerHTML = html;
            }
        });
        
        root.innerHTML = `
            <div class="header">
                <div class="logo">
                    <h1>🔥 BIHARI BATTLE</h1>
                    <p>Free Fire Tournament</p>
                </div>
                <div class="user-badge">
                    <i class="fas fa-user-circle"></i> ${currentUser.email.split('@')[0]}
                    <button id="logoutBtn" class="btn" style="padding:4px 12px;">Exit</button>
                </div>
            </div>
            
            <div class="wallet-card">
                <div class="flex-between">
                    <span><i class="fas fa-wallet"></i> Wallet Balance</span>
                    <span class="balance" id="userWalletAmount">${walletBalance}</span>
                </div>
                <button id="addMoneyBtn" class="btn btn-primary" style="margin-top:12px; width:100%;">
                    <i class="fas fa-plus-circle"></i> Add ₹200 (Demo)
                </button>
            </div>
            
            <div class="tab-bar">
                <div class="tab active" data-tab="tournaments">🏆 Tournaments</div>
                <div class="tab" data-tab="mymatches">🎮 My Matches</div>
                <div class="tab" data-tab="leaderboard">📊 Leaderboard</div>
                <div class="tab" data-tab="history">💰 History</div>
            </div>
            
            <div id="tournamentsPanel">
                <h3><i class="fas fa-fire"></i> Active Tournaments</h3>
                <div id="tournamentList" class="loading">Loading tournaments...</div>
            </div>
            
            <div id="mymatchesPanel" style="display:none;">
                <h3><i class="fas fa-calendar-check"></i> My Joined Matches</h3>
                <div id="myMatchesList" class="loading">Loading your matches...</div>
            </div>
            
            <div id="leaderboardPanel" style="display:none;">
                <h3><i class="fas fa-chart-line"></i> Global Leaderboard</h3>
                <div id="leaderboardList" class="loading">Loading leaderboard...</div>
            </div>
            
            <div id="historyPanel" style="display:none;">
                <h3><i class="fas fa-history"></i> Transaction History</h3>
                <div id="transactionHistory" class="loading">Loading transactions...</div>
            </div>
        `;
        
        document.getElementById('logoutBtn')?.addEventListener('click', () => {
            signOut(auth);
            currentUser = null;
            render();
        });
        
        document.getElementById('addMoneyBtn')?.addEventListener('click', async () => {
            try {
                await updateDoc(userDocRef, { wallet: increment(200) });
                await addDoc(collection(db, "transactions"), {
                    uid: uid,
                    type: "deposit",
                    amount: 200,
                    timestamp: serverTimestamp()
                });
                showToast("₹200 added to wallet!");
                updateWalletDisplay();
            } catch(error) {
                showToast("Failed to add money", true);
            }
        });
        
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const target = tab.dataset.tab;
                document.getElementById('tournamentsPanel').style.display = target === 'tournaments' ? 'block' : 'none';
                document.getElementById('mymatchesPanel').style.display = target === 'mymatches' ? 'block' : 'none';
                document.getElementById('leaderboardPanel').style.display = target === 'leaderboard' ? 'block' : 'none';
                document.getElementById('historyPanel').style.display = target === 'history' ? 'block' : 'none';
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
            });
        });
    }
    
    onAuthStateChanged(auth, (user) => {
        currentUser = user;
        render();
    });
</script>
</body>
</html>
