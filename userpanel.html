<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BBL | Bihar Battle League</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bbl: #f97316; --dark: #020617; }
        body { background-color: var(--dark); color: white; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
        .bg-mesh { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #020408 100%); opacity: 0.6; }
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 35px; }
        .bbl-logo-text { font-family: 'Orbitron', sans-serif; background: linear-gradient(to bottom, #fff, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(249, 115, 22, 0.3)); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeInUp 0.4s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .diamond-nav { width: 56px; height: 56px; background: linear-gradient(135deg, #f97316, #d946ef); transform: rotate(45deg); border-radius: 14px; box-shadow: 0 0 20px rgba(249, 115, 22, 0.5); cursor: pointer; position: relative; top: -25px; border: 2px solid rgba(255,255,255,0.2); }
        .diamond-nav span { transform: rotate(-45deg); display: block; font-weight: 800; font-size: 9px; color: white; }
        .nav-icon { transition: 0.3s; opacity: 0.4; filter: grayscale(1); }
        .nav-icon.active { opacity: 1; filter: grayscale(0); transform: translateY(-3px); }
        .badge-joined { background: rgba(34, 197, 94, 0.2); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.3); padding: 2px 8px; border-radius: 10px; font-size: 8px; font-weight: bold; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-[#020617]">
    <div class="bg-mesh"></div>
<div class="max-w-[450px] mx-auto min-h-screen relative">
        <div id="auth-screen" class="fixed inset-0 z-[200] bg-[#020617] flex items-center justify-center p-8">
            <div class="w-full max-w-sm glass-panel p-10 border-orange-500/20 border text-center">
                <h1 class="text-5xl bbl-logo-text italic mb-1">BBL</h1>
                <p class="text-[8px] text-white/40 tracking-[0.5em] uppercase mb-12 font-bold">Bihar Battle League</p>
                <div class="space-y-4">
                    <div id="signup-fields" class="hidden"><input type="text" id="auth-username" placeholder="Character Name" class="w-full p-4 bg-black/40 rounded-2xl border border-white/5 outline-none text-center text-sm"></div>
                    <input type="email" id="auth-email" placeholder="Email" class="w-full p-4 bg-black/40 rounded-2xl border border-white/5 outline-none text-center text-sm">
                    <input type="password" id="auth-pass" placeholder="Password" class="w-full p-4 bg-black/40 rounded-2xl border border-white/5 outline-none text-center text-sm">
                    <button onclick="processAuth()" id="auth-btn" class="w-full bg-gradient-to-r from-orange-600 to-orange-400 py-4 rounded-2xl font-bold uppercase tracking-widest shadow-lg">ENTER ARENA</button>
                    <p class="text-center text-xs mt-4 text-white/40" onclick="toggleAuthMode()">Toggle Login / Register</p>
                </div>
            </div>
        </div>

        <header id="main-header" class="hidden sticky top-0 z-[100] bg-[#020617]/80 backdrop-blur-xl px-6 py-5 flex justify-between items-center border-b border-white/5">
            <div>
                <h2 class="text-xl font-bold italic tracking-tighter text-white/90 uppercase bbl-logo-text">Bihar Battle League</h2>
                <div class="flex items-center gap-2"><span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span><p class="text-[8px] text-green-500 font-bold uppercase tracking-widest">Nawada Server</p></div>
            </div>
            <div class="glass-panel px-3 py-1.5 rounded-2xl border-orange-500/20 flex items-center gap-3">
                <div class="text-right"><p class="text-[7px] text-white/40 uppercase font-bold">Wallet</p><p class="text-xs font-bold text-orange-400">₹<span id="u-bal">0</span></p></div>
                <img id="h-av" class="w-8 h-8 rounded-full border border-orange-500">
            </div>
        </header>
<main id="main-content" class="hidden p-5 pb-32">
            
            <section id="tab-home" class="tab-content active space-y-8">
                <div id="match-list" class="space-y-8"></div>
            </section>

            <section id="tab-my-matches" class="tab-content space-y-8 text-center">
                <h2 class="text-xl font-bold bbl-logo-text italic mb-6">My Registered Battles</h2>
                <div id="my-match-list" class="space-y-8"></div>
            </section>

            <section id="tab-wallet" class="tab-content text-center space-y-6">
                <div class="glass-panel p-10 border-l-4 border-orange-500 shadow-2xl relative overflow-hidden">
                    <div class="absolute -right-6 -top-6 opacity-10 bbl-logo-text text-6xl rotate-12">CASH</div>
                    <p class="text-white/30 text-[10px] uppercase font-bold tracking-[0.3em] mb-2">Available Balance</p>
                    <h3 class="text-6xl font-bold rajdhani text-orange-500">₹<span id="wallet-display">0</span></h3>
                    <div class="mt-10 space-y-4">
                        <input type="number" id="cash-amount" placeholder="Enter Amount (₹)" class="w-full p-4 bg-black/40 rounded-2xl border border-white/10 text-center font-bold text-orange-400 outline-none">
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="requestCash('Deposit')" class="bg-green-600/20 border border-green-500/40 py-4 rounded-2xl font-bold text-[9px] uppercase tracking-widest text-green-500">Add Cash</button>
                            <button onclick="requestCash('Withdraw')" class="bg-red-600/20 border border-red-500/40 py-4 rounded-2xl font-bold text-[9px] uppercase tracking-widest text-red-500">Withdraw</button>
                        </div>
                    </div>
                </div>
            </section>

            <section id="tab-profile" class="tab-content text-center space-y-6">
                <div class="glass-panel p-10">
                    <img id="p-av" class="w-24 h-24 rounded-full mx-auto mb-4 border-2 border-orange-500 p-1">
                    <h3 id="p-name" class="text-3xl font-bold italic text-orange-500 uppercase">---</h3>
                    <div class="mt-8 space-y-4 text-left">
                        <div class="p-4 bg-black/40 rounded-3xl border border-white/5">
                            <p class="text-[7px] text-white/30 uppercase font-bold mb-1 tracking-widest">Character Identity (UID)</p>
                            <p id="p-uid" class="text-[10px] font-mono font-bold text-orange-200 uppercase break-all">Fetching...</p>
                        </div>
                        <button onclick="logout()" class="w-full py-4 text-red-500 font-bold text-[10px] uppercase border border-red-500/10 rounded-2xl">Logout Arena</button>
                    </div>
                </div>
            </section>
        </main>

        <nav id="bottom-nav" class="hidden fixed bottom-0 left-0 right-0 h-20 bg-[#05070a]/90 backdrop-blur-2xl border-t border-white/5 flex justify-around items-center z-[150] px-4">
            <button onclick="switchTab('home')" class="flex flex-col items-center gap-1">
                <img id="ico-home" src="https://img.icons8.com/material-rounded/24/f97316/home.png" class="w-5 nav-icon active">
                <span class="text-[7px] font-bold text-orange-500">HOME</span>
            </button>
            <button onclick="switchTab('my-matches')" class="flex flex-col items-center gap-1">
                <img id="ico-my-matches" src="https://img.icons8.com/material-rounded/24/ffffff/controller.png" class="w-5 nav-icon">
                <span class="text-[7px] font-bold text-white/40">MY PLAY</span>
            </button>
            <div class="diamond-nav flex items-center justify-center" onclick="switchTab('home')"><span>PLAY</span></div>
            <button onclick="switchTab('wallet')" class="flex flex-col items-center gap-1">
                <img id="ico-wallet" src="https://img.icons8.com/material-rounded/24/ffffff/wallet.png" class="w-5 nav-icon">
                <span class="text-[7px] font-bold text-white/40">CASH</span>
            </button>
            <button onclick="switchTab('profile')" class="flex flex-col items-center gap-1">
                <img id="ico-profile" src="https://img.icons8.com/material-rounded/24/ffffff/user.png" class="w-5 nav-icon">
                <span class="text-[7px] font-bold text-white/40">USER</span>
            </button>
        </nav>
    </div>
<script>
        const firebaseConfig = { apiKey: "AIzaSyDiHxA8fXHVTAKFSU1UMobZMY_Kw7612fw", authDomain: "tournament-app-b77c0.firebaseapp.com", databaseURL: "https://tournament-app-b77c0-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "tournament-app-b77c0", storageBucket: "tournament-app-b77c0.firebasestorage.app", messagingSenderId: "925200484535", appId: "1:925200484535:web:c15c87fcecb5e793bca532" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.firestore();

        function formatBBLDate(dateStr) {
            if(!dateStr) return "TBD";
            const date = new Date(dateStr);
            const options = { day: 'numeric', month: 'short' };
            const dayMonth = date.toLocaleDateString('en-IN', options);
            let h = date.getHours(); let m = date.getMinutes();
            const ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12; m = m < 10 ? '0'+m : m;
            return `${dayMonth} | ${h}:${m} ${ampm}`;
        }

        function toggleAuthMode() { document.getElementById('signup-fields').classList.toggle('hidden'); }
        async function processAuth() {
            const email = document.getElementById('auth-email').value; const pass = document.getElementById('auth-pass').value;
            const isReg = !document.getElementById('signup-fields').classList.contains('hidden');
            try {
                if (isReg) {
                    const nick = document.getElementById('auth-username').value;
                    const res = await auth.createUserWithEmailAndPassword(email, pass);
                    await db.collection('users').doc(res.user.uid).set({uid: res.user.uid, username: nick, email, wallet: 0});
                } else { await auth.signInWithEmailAndPassword(email, pass); }
            } catch (err) { alert(err.message); }
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-header').classList.remove('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('bottom-nav').classList.remove('hidden');
                document.getElementById('p-uid').innerText = user.uid;
                loadRealtimeData(user.uid);
            } else { document.getElementById('auth-screen').style.display = 'flex'; }
        });

        async function requestCash(type) {
            const amt = Number(document.getElementById('cash-amount').value);
            const wallet = Number(document.getElementById('u-bal').innerText);
            if(amt < 10) return alert("Min amount ₹10");
            if(type === 'Withdraw' && amt > wallet) return alert("Insufficient Balance");
            await db.collection('requests').add({ uid: auth.currentUser.uid, username: document.getElementById('p-name').innerText, amount: amt, type: type, status: 'Pending', createdAt: Date.now() });
            alert(type + " Request Sent!");
            document.getElementById('cash-amount').value = '';
        }

        function loadRealtimeData(uid) {
            db.collection('users').doc(uid).onSnapshot(doc => {
                if(!doc.exists) return; const d = doc.data();
                document.getElementById('p-name').innerText = d.username || 'Player';
                document.getElementById('u-bal').innerText = d.wallet || 0;
                document.getElementById('wallet-display').innerText = d.wallet || 0;
                const av = `https://api.dicebear.com/7.x/avataaars/svg?seed=${d.username || 'BBL'}`;
                document.getElementById('h-av').src = av; document.getElementById('p-av').src = av;
            });
            
            db.collection('matches').orderBy('createdAt', 'desc').onSnapshot(async snap => {
                const homeList = document.getElementById('match-list');
                const myList = document.getElementById('my-match-list');
                homeList.innerHTML = ''; myList.innerHTML = '';

                for(const doc of snap.docs) {
                    const m = doc.data();
                    const partSnap = await db.collection('matches').doc(doc.id).collection('participants').doc(uid).get();
                    const hasJoined = partSnap.exists;
                    const card = `
                        <div class="glass-panel overflow-hidden border-white/5 relative mb-8">
                            <div class="h-40 relative">
                                <img src="${m.img || 'https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=800'}" class="w-full h-full object-cover">
                                <div class="absolute inset-0 bg-gradient-to-t from-[#020617] to-transparent"></div>
                                ${hasJoined ? '<div class="absolute top-4 left-4 badge-joined">REGISTERED</div>' : ''}
                            </div>
                            <div class="p-6">
                                <div class="flex justify-between items-start mb-4">
                                    <div><h4 class="text-xl font-bold italic uppercase bbl-logo-text leading-none">${m.title}</h4><p class="text-[9px] text-orange-500 font-bold mt-1">${formatBBLDate(m.startTime)}</p></div>
                                    <div class="text-right"><p class="text-[8px] text-white/40 uppercase">Prize</p><p class="text-lg font-bold text-orange-400 leading-none">₹${m.prizePool}</p></div>
                                </div>
                                ${hasJoined ? 
                                    `<div class="grid grid-cols-2 gap-3 p-4 bg-orange-500/10 rounded-2xl border border-orange-500/20 text-xs font-bold text-orange-400">
                                        <div><p class="text-[7px] text-white/40 uppercase">ID</p>${m.roomId || 'Wait..'}</div>
                                        <div><p class="text-[7px] text-white/40 uppercase">PASS</p>${m.roomPass || 'Wait..'}</div>
                                    </div>` : 
                                    `<button class="w-full bg-orange-600 py-4 rounded-2xl font-bold uppercase tracking-widest text-xs shadow-lg">Join Battle • ₹${m.entryFee}</button>`
                                }
                            </div>
                        </div>`;
                    homeList.innerHTML += card;
                    if(hasJoined) myList.innerHTML += card;
                }
            });
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('tab-' + t).classList.add('active');
            ['home', 'my-matches', 'wallet', 'profile'].forEach(id => {
                const ico = document.getElementById('ico-' + id);
                if(!ico) return;
                if(id === t) { ico.classList.add('active'); ico.nextElementSibling.classList.replace('text-white/40', 'text-orange-500'); }
                else { ico.classList.remove('active'); ico.nextElementSibling.classList.replace('text-orange-500', 'text-white/40'); }
            });
        }
        function logout() { auth.signOut(); location.reload(); }
    </script>
</body>
</html>
