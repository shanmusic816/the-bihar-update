<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BBL | Bihar Battle League</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bbl: #f97316; --dark: #020617; }
        body { background-color: var(--dark); color: white; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .bg-mesh { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #020408 100%); opacity: 0.6; }
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 35px; }
        .bbl-logo-text { font-family: 'Orbitron', sans-serif; background: linear-gradient(to bottom, #fff, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(249, 115, 22, 0.3)); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeInUp 0.4s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .diamond-nav { width: 56px; height: 56px; background: linear-gradient(135deg, #f97316, #d946ef); transform: rotate(45deg); border-radius: 14px; box-shadow: 0 0 20px rgba(249, 115, 22, 0.5); cursor: pointer; position: relative; top: -25px; border: 2px solid rgba(255,255,255,0.2); transition: 0.3s; z-index: 160; }
        .diamond-nav span { transform: rotate(-45deg); display: block; font-weight: 800; font-size: 9px; color: white; }
        .nav-icon { transition: 0.3s; opacity: 0.4; filter: grayscale(1); }
        .nav-icon.active { opacity: 1 !important; filter: grayscale(0) !important; transform: translateY(-3px); }
        .badge-joined { background: rgba(34, 197, 94, 0.2); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.3); padding: 4px 12px; border-radius: 12px; font-size: 10px; font-weight: bold; position: absolute; top: 1rem; left: 1rem; z-index: 20; box-shadow: 0 4px 15px rgba(0,0,0,0.6); }
        .rank-card { border-left: 4px solid transparent; transition: 0.3s; }
        .rank-1 { border-left-color: #fbbf24; background: linear-gradient(90deg, rgba(251, 191, 36, 0.1) 0%, transparent 100%); }
    </style>
</head>
<body class="bg-[#020617]">
    <div class="bg-mesh"></div>
    <div class="max-w-[450px] mx-auto min-h-screen relative text-white">
        <div id="auth-screen" class="fixed inset-0 z-[500] bg-[#020617] flex items-center justify-center p-8 text-center">
            <div class="w-full max-w-sm glass-panel p-10 border-orange-500/20 border">
                <h1 class="text-5xl bbl-logo-text italic mb-1">BBL</h1>
                <p class="text-[8px] text-white/40 tracking-[0.5em] uppercase mb-12 font-bold italic">Bihar Battle League</p>
                <div class="space-y-4">
                    <div id="signup-fields" class="hidden"><input type="text" id="auth-username" placeholder="Game UID" class="w-full p-4 bg-black/40 rounded-2xl border border-white/5 outline-none text-center text-sm mb-4 text-white"></div>
                    <input type="email" id="auth-email" placeholder="Email" class="w-full p-4 bg-black/40 rounded-2xl border border-white/5 outline-none text-center text-sm text-white">
                    <input type="password" id="auth-pass" placeholder="Password" class="w-full p-4 bg-black/40 rounded-2xl border border-white/5 outline-none text-center text-sm text-white">
                    <button onclick="processAuth()" id="auth-btn" class="w-full bg-gradient-to-r from-orange-600 to-orange-400 py-4 rounded-2xl font-bold uppercase tracking-widest text-white shadow-lg">ENTER ARENA</button>
                    <p id="toggle-text" class="text-[10px] text-white/30 uppercase mt-6 cursor-pointer py-2 text-white" onclick="toggleAuthMode()">New Player? <span class="text-orange-500 font-bold">Register</span></p>
                </div>
            </div>
        </div>

        <header id="main-header" class="hidden sticky top-0 z-[100] bg-[#020617]/90 backdrop-blur-xl px-6 py-5 flex justify-between items-center border-b border-white/5">
            <div><h2 class="text-xl font-bold italic bbl-logo-text">BIHAR BATTLE LEAGUE</h2><p class="text-[8px] text-green-500 font-bold uppercase">● Nawada Server</p></div>
            <div class="glass-panel px-3 py-1.5 rounded-2xl border-orange-500/20 flex items-center gap-3 text-white">
                <div class="text-right"><p class="text-[7px] text-white/40 uppercase font-bold leading-none">Wallet</p><p class="text-xs font-bold text-orange-400">₹<span id="u-bal">0</span></p></div>
                <img id="h-av" class="w-8 h-8 rounded-full border border-orange-500 shadow-lg">
            </div>
        </header>
                <main id="main-content" class="hidden p-5 pb-32">
            <section id="tab-home" class="tab-content active space-y-8"><div id="match-list" class="space-y-8"></div></section>
            <section id="tab-my-matches" class="tab-content space-y-8 text-center"><h2 class="text-xl font-bold bbl-logo-text italic mb-6">Registered Battles</h2><div id="my-match-list" class="space-y-8"></div></section>
            
            <section id="tab-leaderboard" class="tab-content text-center space-y-6">
                <h2 class="text-xl font-bold bbl-logo-text italic mb-6 uppercase tracking-widest">Hall of Fame</h2>
                <div class="px-2">
                    <select id="leader-match-select" onchange="loadGlobalLeaderboard(this.value)" class="w-full p-4 bg-black/40 rounded-2xl border border-white/10 text-xs font-bold text-orange-400 outline-none text-white shadow-xl">
                        <option value="">Select Finished Match</option>
                    </select>
                </div>
                <div id="global-res-list" class="space-y-3 px-2 mt-4 text-white"></div>
            </section>

            <section id="tab-wallet" class="tab-content text-center space-y-6">
                <div class="glass-panel p-10 border-l-4 border-orange-500 text-white text-center">
                    <p class="text-white/30 text-[10px] uppercase font-bold mb-2 tracking-widest">Available Balance</p>
                    <h3 class="text-6xl font-bold text-orange-500">₹<span id="wallet-display">0</span></h3>
                    <div class="mt-10 space-y-4">
                        <input type="number" id="cash-amount" placeholder="Amount (₹)" class="w-full p-4 bg-black/40 rounded-2xl border border-white/10 text-center font-bold text-orange-400 outline-none">
                        <button onclick="requestCash('Deposit')" class="w-full bg-green-600/20 text-green-500 py-4 rounded-2xl font-bold uppercase text-[10px]">Add Cash</button>
                    </div>
                </div>
            </section>

            <section id="tab-profile" class="tab-content text-center space-y-6 text-white">
                <div class="glass-panel p-10">
                    <img id="p-av" class="w-24 h-24 rounded-full mx-auto mb-4 border-2 border-orange-500 p-1">
                    <h3 id="p-name" class="text-3xl font-bold italic text-orange-500 uppercase">---</h3>
                    <div class="mt-8 p-4 bg-black/40 rounded-3xl border border-white/5 text-left">
                        <p class="text-[7px] text-white/30 uppercase font-bold mb-1 tracking-widest">Player UID</p>
                        <p id="p-uid" class="text-[10px] font-mono font-bold text-orange-200 uppercase break-all">---</p>
                    </div>
                    <button onclick="logout()" class="w-full mt-6 py-4 text-red-500 font-bold text-[10px] uppercase border border-red-500/10 rounded-2xl tracking-[0.2em]">Logout</button>
                </div>
            </section>
        </main>

        <nav id="bottom-nav" class="hidden fixed bottom-0 left-0 right-0 h-20 bg-[#05070a]/95 backdrop-blur-2xl border-t border-white/5 flex justify-around items-center z-[150] px-4">
            <button onclick="switchTab('home')" class="flex flex-col items-center gap-1"><img id="ico-home" src="https://img.icons8.com/material-rounded/24/f97316/home.png" class="w-5 nav-icon active"><span class="text-[7px] font-bold text-orange-500 uppercase">Home</span></button>
            <button onclick="switchTab('my-matches')" class="flex flex-col items-center gap-1"><img id="ico-my-matches" src="https://img.icons8.com/material-rounded/24/ffffff/controller.png" class="w-5 nav-icon"><span class="text-[7px] font-bold text-white/40 uppercase">Play</span></button>
            <div class="diamond-nav flex items-center justify-center" onclick="switchTab('leaderboard')"><span>WINS</span></div>
            <button onclick="switchTab('wallet')" class="flex flex-col items-center gap-1"><img id="ico-wallet" src="https://img.icons8.com/material-rounded/24/ffffff/wallet.png" class="w-5 nav-icon"><span class="text-[7px] font-bold text-white/40 uppercase">Cash</span></button>
            <button onclick="switchTab('profile')" class="flex flex-col items-center gap-1"><img id="ico-profile" src="https://img.icons8.com/material-rounded/24/ffffff/user.png" class="w-5 nav-icon"><span class="text-[7px] font-bold text-white/40 uppercase">User</span></button>
        </nav>

        <div id="join-modal" class="fixed inset-0 z-[300] bg-black/95 hidden flex items-center justify-center p-6 backdrop-blur-md text-white text-center">
            <div class="glass-panel w-full p-8 border border-orange-500/30 shadow-2xl">
                <h3 class="text-xl font-bold text-orange-500 mb-6 italic uppercase tracking-widest">Join Battle</h3>
                <input type="text" id="game-uid-input" placeholder="Enter Character ID" class="w-full p-4 bg-black/50 rounded-2xl border border-white/10 outline-none text-white mb-6 text-center tracking-widest">
                <button id="final-join-btn" class="w-full bg-gradient-to-r from-orange-600 to-orange-400 py-4 rounded-2xl font-bold tracking-[0.2em] shadow-lg">CONFIRM ENTRY</button>
            </div>
        </div>
        <script>
    const firebaseConfig = { 
        apiKey: "AIzaSyDiHxA8fXHVTAKFSU1UMobZMY_Kw7612fw", 
        authDomain: "tournament-app-b77c0.firebaseapp.com", 
        projectId: "tournament-app-b77c0", 
        storageBucket: "tournament-app-b77c0.firebasestorage.app", 
        messagingSenderId: "925200484535", 
        appId: "1:925200484535:web:c15c87fcecb5e793bca532" 
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(); const db = firebase.firestore();

    let isSignup = false; let selectedMatch = { id: null, fee: 0 };

    function toggleAuthMode() { isSignup = !isSignup; document.getElementById('signup-fields').classList.toggle('hidden', !isSignup); document.getElementById('auth-btn').innerText = isSignup ? "CREATE ACCOUNT" : "ENTER ARENA"; }
    async function processAuth() {
        const email = document.getElementById('auth-email').value.trim(); const pass = document.getElementById('auth-pass').value.trim();
        try { if (isSignup) { const nick = document.getElementById('auth-username').value.trim(); const res = await auth.createUserWithEmailAndPassword(email, pass); await db.collection('users').doc(res.user.uid).set({uid: res.user.uid, username: nick, email, wallet: 0, createdAt: Date.now()}); } else { await auth.signInWithEmailAndPassword(email, pass); }
        } catch (err) { alert(err.message); }
    }

    auth.onAuthStateChanged(user => { if (user) { document.getElementById('auth-screen').style.display = 'none'; document.querySelectorAll('#main-header, #main-content, #bottom-nav').forEach(el => el.classList.remove('hidden')); loadData(user.uid); loadMatches(user.uid); loadFinishedMatches(); } else { document.getElementById('auth-screen').style.display = 'flex'; } });

    function loadData(uid) { db.collection('users').doc(uid).onSnapshot(doc => { const d = doc.data(); document.getElementById('u-bal').innerText = d.wallet || 0; document.getElementById('wallet-display').innerText = d.wallet || 0; document.getElementById('p-name').innerText = d.username; document.getElementById('p-uid').innerText = uid; const av = `https://api.dicebear.com/7.x/avataaars/svg?seed=${d.username}`; document.getElementById('h-av').src = av; document.getElementById('p-av').src = av; }); }

    function loadMatches(uid) {
        db.collection('matches').orderBy('createdAt', 'desc').onSnapshot(snap => {
            const list = document.getElementById('match-list'); const myList = document.getElementById('my-match-list');
            list.innerHTML = ""; myList.innerHTML = "";
            snap.forEach(doc => {
                const m = doc.data(); const mId = doc.id;
                db.collection('matches').doc(mId).collection('participants').doc(uid).onSnapshot(pDoc => {
                    const hasJoined = pDoc.exists;
                    const cardHTML = `<div class="glass-panel overflow-hidden border-white/5 relative mb-8"><div class="h-44 relative"><img src="${m.img}" class="w-full h-full object-cover"><div class="absolute inset-0 bg-gradient-to-t from-[#020617] via-transparent to-transparent"></div>${hasJoined ? '<div class="badge-joined uppercase">REGISTERED</div>' : ''}<div class="absolute bottom-4 left-6 text-left"><h4 class="text-2xl font-bold italic bbl-logo-text uppercase">${m.title}</h4></div></div><div class="p-6 text-white text-left"><div class="flex justify-between items-center mb-6 text-[10px] font-bold"><div class="text-orange-500 bg-orange-500/10 px-3 py-1 rounded-full border border-orange-500/20">₹${m.prizePool} Prize</div><div>Entry: ₹${m.entryFee}</div></div>${hasJoined ? `<div class="grid grid-cols-2 gap-3 p-4 bg-orange-500/10 rounded-2xl border border-orange-500/20 text-xs font-bold text-orange-400"><div><p class="text-[7px] text-white/40 uppercase mb-1 font-bold">Room ID</p>${m.roomId || 'Wait..'}</div><div><p class="text-[7px] text-white/40 uppercase mb-1 font-bold">Pass</p>${m.roomPass || 'Wait..'}</div></div>` : `<button onclick="openJoinUI('${mId}', ${m.entryFee}, '${m.title}')" class="w-full bg-orange-600 py-4 rounded-2xl font-bold uppercase text-xs">Join Battle</button>`}</div></div>`;
                    list.innerHTML += cardHTML; if(hasJoined) myList.innerHTML += cardHTML;
                });
            });
        });
    }

    function loadFinishedMatches() {
        db.collection('matches').where('status', '==', 'Finished').onSnapshot(snap => {
            const select = document.getElementById('leader-match-select');
            select.innerHTML = '<option value="">Select Finished Match</option>';
            snap.forEach(doc => { select.innerHTML += `<option value="${doc.id}">${doc.data().title}</option>`; });
        });
    }

    function loadGlobalLeaderboard(mId) {
        if(!mId) return;
        db.collection('matches').doc(mId).collection('participants').orderBy('rank', 'asc').onSnapshot(snap => {
            const resList = document.getElementById('global-res-list');
            resList.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data();
                if(p.status === 'Verified') {
                    resList.innerHTML += `<div class="glass-panel p-4 flex justify-between items-center border border-white/5 rank-card ${p.rank==1?'rank-1':''} text-white"><div class="flex items-center gap-4"><span class="text-xl font-bold">${p.rank==1?'🥇':'#'+p.rank}</span><h4 class="text-xs font-bold uppercase tracking-widest">${p.gameUid}</h4></div><div><p class="text-[7px] text-white/40 uppercase mb-1 font-bold">Kills</p><p class="text-sm font-bold text-orange-500">${p.kills}</p></div></div>`;
                }
            });
        });
    }

    window.openJoinUI = (id, fee, title) => { selectedMatch = { id, fee: Number(fee) }; document.getElementById('join-modal').classList.remove('hidden'); };
    
    document.getElementById('final-join-btn').onclick = async () => {
        const gUid = document.getElementById('game-uid-input').value.trim();
        try { const uRef = db.collection('users').doc(auth.currentUser.uid); await db.runTransaction(async (t) => { const uDoc = await t.get(uRef); if (uDoc.data().wallet < selectedMatch.fee) throw "Low Balance!"; t.update(uRef, { wallet: uDoc.data().wallet - selectedMatch.fee }); t.set(db.collection('matches').doc(selectedMatch.id).collection('participants').doc(auth.currentUser.uid), { gameUid: gUid, status: 'Joined', rank: 0, kills: 0, time: Date.now() }); }); alert("Success!"); document.getElementById('join-modal').classList.add('hidden'); } catch (e) { alert(e); }
    };

    function switchTab(t) { 
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active')); document.getElementById('tab-' + t).classList.add('active'); 
        ['home', 'my-matches', 'wallet', 'profile', 'leaderboard'].forEach(id => { const ico = document.getElementById('ico-' + id); if(ico) { if(id === t) { ico.classList.add('active'); ico.nextElementSibling.style.color = '#f97316'; } else { ico.classList.remove('active'); ico.nextElementSibling.style.color = 'rgba(255,255,255,0.4)'; } } }); 
    }
    function logout() { auth.signOut(); location.reload(); }
</script>
</body>
</html>
