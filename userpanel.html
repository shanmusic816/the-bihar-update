<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BBL | Bharat Battle League</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Orbitron:wght@700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --bbl: #f97316; --dark: #020617; }
        body { background-color: var(--dark); color: white; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .syncopate-font { font-family: 'Syncopate', sans-serif; text-transform: uppercase; font-style: italic; }
        .bbl-logo-text { font-family: 'Orbitron', sans-serif; background: linear-gradient(to bottom, #fff, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .bg-mesh { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #020408 100%); opacity: 0.6; }
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 30px; }
        .neon-btn { background: var(--bbl); color: white; font-weight: 700; border-radius: 20px; padding: 18px; width: 100%; text-transform: uppercase; font-size: 11px; letter-spacing: 2px; border:none; cursor:pointer; transition: 0.3s; text-align: center; display: block; box-shadow: 0 10px 30px rgba(249, 115, 22, 0.2); text-decoration: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .hidden { display: none !important; }
        .nav-link-btn { font-size: 10px; font-weight: bold; transition: 0.3s; background: none; border: none; cursor: pointer; }
        /* Detail Badge Style */
        .m-badge { background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 8px; font-size: 9px; font-weight: 700; color: #ff6b00; }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="max-w-[450px] mx-auto min-h-screen relative">

        <div id="welcome-node" class="flex flex-col items-center text-center p-8 space-y-8 pt-12">
            <div class="syncopate-font"><h1 class="text-5xl text-white">BHARAT</h1><h2 class="text-4xl text-orange-500">BATTLE LEAGUE</h2></div>
            <button onclick="enterArena()" class="neon-btn">ENTER ARENA NODE</button>
            <div class="flex gap-3 w-full">
                <a href="https://www.instagram.com/biharbattleleague" target="_blank" class="flex-1 bg-white/5 p-3 rounded-2xl text-[9px] font-bold">INSTAGRAM</a>
                <a href="https://youtube.com/@songheartstation" target="_blank" class="flex-1 bg-white/5 p-3 rounded-2xl text-[9px] font-bold">YOUTUBE</a>
            </div>
        </div>

        <div id="auth-screen" class="hidden fixed inset-0 z-[500] bg-[#020617] flex items-center justify-center p-8">
            <div class="w-full max-w-sm glass-panel p-10 border border-orange-500/20 text-center shadow-2xl">
                <h1 class="text-6xl bbl-logo-text mb-8 italic">BBL</h1>
                <div class="space-y-4">
                    <div id="signup-fields" class="hidden"><input type="text" id="auth-username" placeholder="Nickname" class="bg-black/50 w-full p-4 rounded-xl border border-white/10 outline-none text-center text-white"></div>
                    <input type="email" id="auth-email" placeholder="Email" class="bg-black/50 w-full p-4 rounded-xl border border-white/10 outline-none text-center text-white">
                    <input type="password" id="auth-pass" placeholder="Password" class="bg-black/50 w-full p-4 rounded-xl border border-white/10 outline-none text-center text-white">
                    <button onclick="processAuth()" id="auth-btn" class="neon-btn">LOGIN</button>
                    <p class="text-[10px] text-white/30 uppercase mt-8 cursor-pointer" onclick="toggleAuthMode()">Register New Player</p>
                </div>
            </div>
        </div>

        <header id="main-header" class="hidden sticky top-0 z-[100] bg-[#020617]/90 backdrop-blur-xl px-6 py-5 flex justify-between items-center border-b border-white/5">
            <h2 class="text-xl font-bold bbl-logo-text italic">BBL LOBBY</h2>
            <div class="glass-panel px-3 py-1.5 border-orange-500/20 flex items-center gap-3">
                <p class="text-xs font-bold text-orange-400">₹<span id="u-bal">0</span></p>
                <img id="h-av" class="w-8 h-8 rounded-full border border-orange-500" onclick="switchTab('wallet')">
            </div>
        </header>

        <main id="main-content" class="hidden p-5 pb-32">
            <div id="tab-home" class="tab-content active"><div id="match-list" class="space-y-8"></div></div>
            <div id="tab-my" class="tab-content">
                <h3 class="text-center text-orange-500 font-bold mb-6 italic uppercase tracking-widest">My Matches</h3>
                <div id="my-match-list" class="space-y-8"></div>
            </div>
            <div id="tab-wallet" class="tab-content text-center">
                <div class="glass-panel p-10 border-l-4 border-orange-500">
                    <p class="text-[10px] text-white/40 uppercase mb-1 font-bold">Character UID: <span id="wallet-uid">---</span></p>
                    <h3 class="text-6xl font-bold text-orange-500 italic mb-10">₹<span id="wallet-display">0</span></h3>
                    <div class="space-y-4">
                        <a href="https://thebiharupdate.vercel.app/payout" class="neon-btn">Withdraw Reward</a>
                        <a href="https://wa.me/919472641762" target="_blank" class="block bg-[#25d366]/10 text-[#25d366] p-4 rounded-2xl font-bold text-[10px] uppercase border border-[#25d366]/20 text-center">WhatsApp Support</a>
                        <button onclick="logoutUser()" class="w-full mt-6 text-[10px] text-white/20 font-bold uppercase">Logout</button>
                    </div>
                </div>
            </div>
        </main>

        <nav id="bottom-nav" class="hidden fixed bottom-0 left-0 right-0 h-20 bg-black/95 border-t border-white/5 flex justify-around items-center z-[150]">
            <button id="btn-home" onclick="switchTab('home')" class="nav-link-btn text-orange-500">HOME</button>
            <button id="btn-my" onclick="switchTab('my')" class="nav-link-btn text-white/40">MATCHES</button>
            <button id="btn-wallet" onclick="switchTab('wallet')" class="nav-link-btn text-white/40">WALLET</button>
        </nav>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDiHxA8fXHVTAKFSU1UMobZMY_Kw7612fw",
            authDomain: "tournament-app-b77c0.firebaseapp.com",
            projectId: "tournament-app-b77c0",
            storageBucket: "tournament-app-b77c0.firebasestorage.app",
            messagingSenderId: "925200484535",
            appId: "1:925200484535:web:c15c87fcecb5e793bca532"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.firestore();
        let isSignup = false;

        function enterArena() { document.getElementById('welcome-node').style.display = 'none'; document.getElementById('auth-screen').classList.remove('hidden'); }
        function toggleAuthMode() { isSignup = !isSignup; document.getElementById('signup-fields').classList.toggle('hidden', !isSignup); document.getElementById('auth-btn').innerText = isSignup ? "CREATE" : "LOGIN"; }

        async function processAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            try {
                if (isSignup) {
                    const nick = document.getElementById('auth-username').value || "Warrior";
                    const res = await auth.createUserWithEmailAndPassword(email, pass);
                    await db.collection('users').doc(res.user.uid).set({ uid: res.user.uid, username: nick, wallet: 0 });
                } else { await auth.signInWithEmailAndPassword(email, pass); }
            } catch (err) { alert(err.message); }
        }

        function logoutUser() { auth.signOut().then(() => location.reload()); }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('welcome-node').style.display = 'none'; 
                document.getElementById('auth-screen').classList.add('hidden');
                document.querySelectorAll('#main-header, #main-content, #bottom-nav').forEach(el => el.classList.remove('hidden'));
                document.getElementById('wallet-uid').innerText = user.uid;
                loadData(user.uid);
            }
        });

        function loadData(uid) {
            db.collection('users').doc(uid).onSnapshot(doc => {
                if(!doc.exists) return;
                document.getElementById('u-bal').innerText = doc.data().wallet || 0;
                document.getElementById('wallet-display').innerText = doc.data().wallet || 0;
                document.getElementById('h-av').src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${doc.data().username}`;
            });

            db.collection('matches').orderBy('createdAt', 'desc').onSnapshot(snap => {
                const list = document.getElementById('match-list');
                const myList = document.getElementById('my-match-list');
                list.innerHTML = ""; 
                myList.innerHTML = "";

                snap.forEach(mDoc => {
                    const m = mDoc.data();
                    const mId = mDoc.id;

                    db.collection('matches').doc(mId).collection('participants').doc(uid).onSnapshot(pDoc => {
                        const hasJoined = pDoc.exists;
                        
                        const existingCard = document.getElementById("match-" + mId);
                        if (existingCard) existingCard.remove();

                        // --- NEW UPDATED CARD WITH TIME/MAP FEATURES ---
                        const cardHTML = `
                            <div id="match-${mId}" class="glass-panel overflow-hidden border-white/5 mb-6">
                                <div class="relative">
                                    <img src="${m.img || 'https://via.placeholder.com/400x180'}" class="w-full h-36 object-cover opacity-80">
                                    <div class="absolute bottom-2 left-2 flex flex-wrap gap-2">
                                        <span class="m-badge">📅 ${m.matchDate || 'TBA'}</span>
                                        <span class="m-badge">⏰ ${m.matchTime || 'TBA'}</span>
                                    </div>
                                    <div class="absolute top-2 right-2 flex flex-wrap gap-2">
                                        <span class="m-badge" style="color:white; background:rgba(249,115,22,0.8)">${m.map || 'Bermuda'}</span>
                                        <span class="m-badge" style="color:white; background:rgba(16,185,129,0.8)">${m.mode || 'Solo'}</span>
                                    </div>
                                </div>
                                <div class="p-6">
                                    <h4 class="text-xl font-bold bbl-logo-text mb-2 uppercase italic">${m.title}</h4>
                                    <div class="flex justify-between text-[10px] mb-4 text-orange-500 font-bold uppercase italic">
                                        <span>Prize Pool: ₹${m.prizePool || 0}</span><span>Entry: ₹${m.fee || 0}</span>
                                    </div>
                                    ${hasJoined ? 
                                        `<div class="bg-orange-500/10 p-4 rounded-xl border border-orange-500/20 text-center">
                                            <p class="text-[9px] text-orange-500 font-bold mb-1 uppercase tracking-widest">Status: Joined ✅</p>
                                            <p class="text-xs">ID: ${m.roomId || 'WAITING'} | PASS: ${m.roomPass || 'WAITING'}</p>
                                        </div>` : 
                                        `<button onclick="joinMatch('${mId}', ${m.fee || 0})" class="neon-btn !p-3 !text-[10px]">Join Arena</button>`
                                    }
                                </div>
                            </div>`;
                        
                        list.innerHTML += cardHTML;
                        if(hasJoined) myList.innerHTML += cardHTML.replace(`id="match-${mId}"`, `id="my-match-${mId}"`);
                    });
                });
            });
        }

        async function joinMatch(id, fee) {
            const user = auth.currentUser;
            const uRef = db.collection('users').doc(user.uid);
            try {
                const uDoc = await uRef.get();
                const bal = Number(uDoc.data().wallet || 0);
                if(bal < fee) return alert("Paisa kam hai bhai!");
                
                if(confirm(`₹${fee} kategi, join karein?`)) {
                    await db.runTransaction(async (t) => {
                        const freshU = await t.get(uRef);
                        t.update(uRef, { wallet: Number(freshU.data().wallet) - fee });
                        t.set(db.collection('matches').doc(id).collection('participants').doc(user.uid), { 
                            uid: String(user.uid), 
                            username: String(freshU.data().username || "Player"), 
                            joinedAt: Date.now() 
                        });
                    });
                    alert("Joined Successfully!");
                }
            } catch(e) { alert("Join Failed! Firebase Error."); }
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('tab-' + t).classList.add('active');
            document.querySelectorAll('.nav-link-btn').forEach(btn => btn.classList.replace('text-orange-500', 'text-white/40'));
            document.getElementById('btn-' + t).classList.replace('text-white/40', 'text-orange-500');
        }
    </script>
</body>
</html>
