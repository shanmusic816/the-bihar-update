<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BBL | Bharat Battle League</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bbl: #f97316; --dark: #020617; }
        body { background-color: var(--dark); color: white; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .bg-mesh { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #020408 100%); opacity: 0.6; }
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 35px; }
        .bbl-logo-text { font-family: 'Orbitron', sans-serif; background: linear-gradient(to bottom, #fff, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(249, 115, 22, 0.3)); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeInUp 0.4s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .diamond-nav { width: 56px; height: 56px; background: linear-gradient(135deg, #f97316, #d946ef); transform: rotate(45deg); border-radius: 14px; box-shadow: 0 0 20px rgba(249, 115, 22, 0.5); cursor: pointer; position: relative; top: -25px; border: 2px solid rgba(255,255,255,0.2); transition: 0.3s; }
        .diamond-nav span { transform: rotate(-45deg); display: block; font-weight: 800; font-size: 9px; color: white; }
        .nav-icon { transition: 0.3s; opacity: 0.4; filter: grayscale(1); }
        .nav-icon.active { opacity: 1; filter: grayscale(0); transform: translateY(-3px); }
        .badge-joined { background: rgba(34, 197, 94, 0.2); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.3); padding: 4px 12px; border-radius: 12px; font-size: 10px; font-weight: bold; position: absolute; top: 1rem; left: 1rem; z-index: 20; box-shadow: 0 4px 15px rgba(0,0,0,0.6); }
    </style>
</head>
<body class="bg-[#020617]">
    <div class="bg-mesh"></div>
    <div class="max-w-[450px] mx-auto min-h-screen relative">
        <div id="auth-screen" class="fixed inset-0 z-[200] bg-[#020617] flex items-center justify-center p-8 text-center">
            <div class="w-full max-w-sm glass-panel p-10 border-orange-500/20 border">
                <h1 class="text-5xl bbl-logo-text italic mb-1">BBL</h1>
                <p class="text-[8px] text-white/40 tracking-[0.5em] uppercase mb-12 font-bold">Bharat Battle League</p>
                <div class="space-y-4">
                    <div id="signup-fields" class="hidden"><input type="text" id="auth-username" placeholder="Character Name" class="w-full p-4 bg-black/40 rounded-2xl border border-white/5 outline-none text-center text-sm mb-4"></div>
                    <input type="email" id="auth-email" placeholder="Email" class="w-full p-4 bg-black/40 rounded-2xl border border-white/5 outline-none text-center text-sm">
                    <input type="password" id="auth-pass" placeholder="Password" class="w-full p-4 bg-black/40 rounded-2xl border border-white/5 outline-none text-center text-sm">
                    <button onclick="processAuth()" id="auth-btn" class="w-full bg-gradient-to-r from-orange-600 to-orange-400 py-4 rounded-2xl font-bold uppercase tracking-widest shadow-lg">ENTER ARENA</button>
                    <p id="toggle-text" class="text-[10px] text-white/30 uppercase mt-6 cursor-pointer py-2" onclick="toggleAuthMode()">New Player? <span class="text-orange-500 font-bold">Register</span></p>
                </div>
            </div>
        </div>

        <header id="main-header" class="hidden sticky top-0 z-[100] bg-[#020617]/90 backdrop-blur-xl px-6 py-5 flex justify-between items-center border-b border-white/5">
            <div><h2 class="text-xl font-bold italic bbl-logo-text">BHARAT BATTLE LEAGUE</h2><p class="text-[8px] text-green-500 font-bold uppercase">● INDIA Server</p></div>
            <div class="glass-panel px-3 py-1.5 rounded-2xl border-orange-500/20 flex items-center gap-3">
                <div class="text-right"><p class="text-[7px] text-white/40 uppercase font-bold leading-none">Wallet</p><p class="text-xs font-bold text-orange-400">₹<span id="u-bal">0</span></p></div>
                <img id="h-av" class="w-8 h-8 rounded-full border border-orange-500 shadow-lg">
            </div>
        </header>
        <main id="main-content" class="hidden p-5 pb-32">
            <section id="tab-home" class="tab-content active space-y-8"><div id="match-list" class="space-y-8"></div></section>
            <section id="tab-my-matches" class="tab-content space-y-8 text-center"><h2 class="text-xl font-bold bbl-logo-text italic mb-6">Registered Battles</h2><div id="my-match-list" class="space-y-8"></div></section>
            <section id="tab-wallet" class="tab-content text-center space-y-6">
                <div class="glass-panel p-10 border-l-4 border-orange-500 shadow-2xl relative overflow-hidden text-center">
                    <p class="text-white/30 text-[10px] uppercase font-bold tracking-[0.3em] mb-2">Available Balance</p>
                    <h3 class="text-6xl font-bold rajdhani text-orange-500">₹<span id="wallet-display">0</span></h3>
                    <div class="mt-10 space-y-4">
                        <input type="number" id="cash-amount" placeholder="Amount (₹)" class="w-full p-4 bg-black/40 rounded-2xl border border-white/10 text-center font-bold text-orange-400 outline-none">
                        <button onclick="requestCash('Deposit')" class="w-full bg-green-600/20 text-green-500 py-4 rounded-2xl font-bold uppercase text-[10px]">Add Cash</button>
                    </div>
                </div>
            </section>
            <section id="tab-profile" class="tab-content text-center space-y-6">
                <div class="glass-panel p-10">
                    <img id="p-av" class="w-24 h-24 rounded-full mx-auto mb-4 border-2 border-orange-500 p-1">
                    <h3 id="p-name" class="text-3xl font-bold italic text-orange-500 uppercase">---</h3>
                    <div class="mt-8 p-4 bg-black/40 rounded-3xl border border-white/5 text-left">
                        <p class="text-[7px] text-white/30 uppercase font-bold mb-1 tracking-widest">Player UID</p>
                        <p id="p-uid" class="text-[10px] font-mono font-bold text-orange-200 uppercase break-all">---</p>
                    </div>
                    <button onclick="logout()" class="w-full mt-6 py-4 text-red-500 font-bold text-[10px] uppercase border border-red-500/10 rounded-2xl tracking-[0.2em]">Logout</button>
                </div>
            </section>
        </main>

        <div id="join-modal" class="fixed inset-0 z-[300] bg-black/95 hidden flex items-center justify-center p-6 backdrop-blur-md">
            <div class="glass-panel w-full p-8 border border-orange-500/30 shadow-2xl">
                <h3 class="text-xl font-bold rajdhani text-orange-500 mb-2 italic uppercase tracking-widest">Join Battle</h3>
                <p id="modal-match-title" class="text-[10px] text-white/40 mb-6 uppercase font-bold tracking-widest"></p>
                <input type="text" id="game-uid-input" placeholder="Enter Character ID" class="w-full p-4 bg-black/50 rounded-2xl border border-white/10 outline-none text-white mb-6 text-center tracking-widest">
                <button id="final-join-btn" class="w-full bg-gradient-to-r from-orange-600 to-orange-400 py-4 rounded-2xl font-bold rajdhani tracking-[0.2em] shadow-lg">CONFIRM ENTRY</button>
                <button onclick="document.getElementById('join-modal').classList.add('hidden')" class="w-full mt-4 text-white/20 text-[10px] font-bold uppercase tracking-widest">Cancel</button>
            </div>
        </div>

        <nav id="bottom-nav" class="hidden fixed bottom-0 left-0 right-0 h-20 bg-[#05070a]/95 backdrop-blur-2xl border-t border-white/5 flex justify-around items-center z-[150] px-4">
            <button onclick="switchTab('home')" class="flex flex-col items-center gap-1"><img id="ico-home" src="https://img.icons8.com/material-rounded/24/f97316/home.png" class="w-5 nav-icon active"><span class="text-[7px] font-bold text-orange-500 uppercase">Home</span></button>
            <button onclick="switchTab('my-matches')" class="flex flex-col items-center gap-1"><img id="ico-my-matches" src="https://img.icons8.com/material-rounded/24/ffffff/controller.png" class="w-5 nav-icon"><span class="text-[7px] font-bold text-white/40 uppercase">My Play</span></button>
            <div class="diamond-nav flex items-center justify-center" onclick="switchTab('home')"><span>PLAY</span></div>
            <button onclick="switchTab('wallet')" class="flex flex-col items-center gap-1"><img id="ico-wallet" src="https://img.icons8.com/material-rounded/24/ffffff/wallet.png" class="w-5 nav-icon"><span class="text-[7px] font-bold text-white/40 uppercase">Cash</span></button>
            <button onclick="switchTab('profile')" class="flex flex-col items-center gap-1"><img id="ico-profile" src="https://img.icons8.com/material-rounded/24/ffffff/user.png" class="w-5 nav-icon"><span class="text-[7px] font-bold text-white/40 uppercase">User</span></button>
        </nav>
    </div>
<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyDiHxA8fXHVTAKFSU1UMobZMY_Kw7612fw", 
        authDomain: "tournament-app-b77c0.firebaseapp.com", 
        databaseURL: "https://tournament-app-b77c0-default-rtdb.asia-southeast1.firebasedatabase.app", 
        projectId: "tournament-app-b77c0", 
        storageBucket: "tournament-app-b77c0.firebasestorage.app", 
        messagingSenderId: "925200484535", 
        appId: "1:925200484535:web:c15c87fcecb5e793bca532" 
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(); const db = firebase.firestore();

    let isSignup = false;
    let selectedMatch = { id: null, fee: 0 };

    function formatBBLDate(dateStr) {
        if(!dateStr) return "TBD"; const date = new Date(dateStr);
        return date.toLocaleDateString('en-IN', {day:'numeric', month:'short'}) + " | " + date.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});
    }

    function toggleAuthMode() {
        isSignup = !isSignup;
        document.getElementById('signup-fields').classList.toggle('hidden', !isSignup);
        document.getElementById('auth-btn').innerText = isSignup ? "CREATE ACCOUNT" : "ENTER ARENA";
        document.getElementById('toggle-text').innerHTML = isSignup ? 'Already a Player? <span class="text-orange-500 font-bold">Login</span>' : 'New Player? <span class="text-orange-500 font-bold">Register</span>';
    }

    async function processAuth() {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        if(!email || !pass) return alert("Fill details!");
        try {
            if (isSignup) {
                const nick = document.getElementById('auth-username').value;
                const res = await auth.createUserWithEmailAndPassword(email, pass);
                await db.collection('users').doc(res.user.uid).set({uid: res.user.uid, username: nick, email, wallet: 0, createdAt: Date.now()});
            } else { await auth.signInWithEmailAndPassword(email, pass); }
        } catch (err) { alert(err.message); }
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.querySelectorAll('#main-header, #main-content, #bottom-nav').forEach(el => el.classList.remove('hidden'));
            document.getElementById('p-uid').innerText = user.uid;
            loadData(user.uid);
        } else { document.getElementById('auth-screen').style.display = 'flex'; }
    });

    function loadData(uid) {
        // User Profile Sync
        db.collection('users').doc(uid).onSnapshot(doc => {
            if(!doc.exists) return; const d = doc.data();
            document.getElementById('p-name').innerText = d.username || 'Player';
            document.getElementById('u-bal').innerText = d.wallet || 0;
            document.getElementById('wallet-display').innerText = d.wallet || 0;
            const av = `https://api.dicebear.com/7.x/avataaars/svg?seed=${d.username || 'BBL'}`;
            document.getElementById('h-av').src = av; document.getElementById('p-av').src = av;
        });

        // Matches Sync - No Async Loop (Instant Refresh)
        db.collection('matches').orderBy('createdAt', 'desc').onSnapshot(snap => {
            const list = document.getElementById('match-list');
            const myList = document.getElementById('my-match-list');
            list.innerHTML = ""; myList.innerHTML = "";

            snap.forEach(doc => {
                const m = doc.data();
                const mId = doc.id;

                // Checking Registered Status
                db.collection('matches').doc(mId).collection('participants').doc(uid).onSnapshot(pDoc => {
                    const hasJoined = pDoc.exists;
                    const cardID = `card-${mId}`;
                    const existingCard = document.getElementById(cardID);

                    const cardHTML = `
                        <div id="${cardID}" class="glass-panel overflow-hidden border-white/5 relative mb-8">
                            <div class="h-44 relative">
                                <img src="${m.img || 'https://via.placeholder.com/400x200'}" class="w-full h-full object-cover">
                                <div class="absolute inset-0 bg-gradient-to-t from-[#020617] via-transparent to-transparent"></div>
                                ${hasJoined ? '<div class="badge-joined tracking-widest uppercase">REGISTERED</div>' : ''}
                                <div class="absolute bottom-4 left-6">
                                    <h4 class="text-2xl font-bold italic bbl-logo-text leading-none uppercase">${m.title}</h4>
                                    <p class="text-[9px] text-orange-500 font-bold mt-1 uppercase">${formatBBLDate(m.startTime)}</p>
                                </div>
                            </div>
                            <div class="p-6 pt-2 text-left">
                                <div class="flex justify-between items-center mb-6">
                                    <div class="text-[10px] font-bold text-orange-500 uppercase bg-orange-500/10 px-3 py-1 rounded-full border border-orange-500/20">₹${m.prizePool} Prize</div>
                                    <div class="text-[10px] font-bold text-white/40 uppercase">Entry: ₹${m.entryFee}</div>
                                </div>
                                ${hasJoined ? 
                                    `<div class="grid grid-cols-2 gap-3 p-4 bg-orange-500/10 rounded-2xl border border-orange-500/20 text-xs font-bold text-orange-400">
                                        <div><p class="text-[7px] text-white/40 uppercase font-bold mb-1">Room ID</p>${m.roomId || 'Wait..'}</div>
                                        <div><p class="text-[7px] text-white/40 uppercase font-bold mb-1">Pass</p>${m.roomPass || 'Wait..'}</div>
                                    </div>` : 
                                    `<button onclick="openJoinUI('${mId}', ${m.entryFee}, '${m.title}')" class="w-full bg-orange-600 py-4 rounded-2xl font-bold uppercase tracking-[0.2em] text-xs shadow-lg active:scale-95 transition-all">Join Battle</button>`
                                }
                            </div>
                        </div>`;

                    // Update Main List
                    if(existingCard) existingCard.outerHTML = cardHTML;
                    else list.innerHTML += cardHTML;

                    // Update My Matches List
                    if(hasJoined) {
                        const myCardID = `my-${cardID}`;
                        const existingMyCard = document.getElementById(myCardID);
                        const myCardHTML = cardHTML.replace(cardID, myCardID);
                        if(existingMyCard) existingMyCard.outerHTML = myCardHTML;
                        else myList.innerHTML += myCardHTML;
                    }
                });
            });
        });
    }

    window.openJoinUI = (id, fee, title) => {
        selectedMatch = { id, fee };
        document.getElementById('modal-match-title').innerText = title;
        document.getElementById('join-modal').classList.remove('hidden');
    };

    document.getElementById('final-join-btn').onclick = async () => {
        const gUid = document.getElementById('game-uid-input').value.trim();
        if(!gUid) return alert("Character ID required!");
        const btn = document.getElementById('final-join-btn'); btn.innerText = "Processing..."; btn.disabled = true;
        try {
            const uRef = db.collection('users').doc(auth.currentUser.uid);
            await db.runTransaction(async (t) => {
                const uDoc = await t.get(uRef);
                if (uDoc.data().wallet < selectedMatch.fee) throw "Insufficient Balance!";
                t.update(uRef, { wallet: uDoc.data().wallet - selectedMatch.fee });
                t.set(db.collection('matches').doc(selectedMatch.id).collection('participants').doc(auth.currentUser.uid), { gameUid: gUid, time: Date.now() });
            });
            alert("Match Registered!"); document.getElementById('join-modal').classList.add('hidden');
            document.getElementById('game-uid-input').value = "";
        } catch (e) { alert(e); } finally { btn.innerText = "CONFIRM ENTRY"; btn.disabled = false; }
    };

    function switchTab(t) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById('tab-' + t).classList.add('active');
        ['home', 'my-matches', 'wallet', 'profile'].forEach(id => {
            const ico = document.getElementById('ico-' + id);
            if(ico) {
                if(id === t) { ico.classList.add('active'); ico.nextElementSibling.style.color = '#f97316'; }
                else { ico.classList.remove('active'); ico.nextElementSibling.style.color = 'rgba(255,255,255,0.4)'; }
            }
        });
    }

    async function requestCash(type) {
        const amt = Number(document.getElementById('cash-amount').value);
        if(amt < 10) return alert("Min ₹10");
        await db.collection('requests').add({ uid: auth.currentUser.uid, username: document.getElementById('p-name').innerText, amount: amt, type, status: 'Pending', createdAt: Date.now() });
        alert("Deposit Request Sent!"); document.getElementById('cash-amount').value = '';
    }

    function logout() { auth.signOut(); location.reload(); }
</script>
</body>
                        </html>
