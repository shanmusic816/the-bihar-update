<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BBL | Bharat Battle League</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Orbitron:wght@700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --bbl: #f97316; --dark: #020617; }
        body { background-color: var(--dark); color: white; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .syncopate-font { font-family: 'Syncopate', sans-serif; text-transform: uppercase; font-style: italic; }
        .bbl-logo-text { font-family: 'Orbitron', sans-serif; background: linear-gradient(to bottom, #fff, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(249, 115, 22, 0.3)); }
        .bg-mesh { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #020408 100%); opacity: 0.6; }
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 30px; }
        .dna-box { border: 1px solid var(--bbl); border-radius: 28px; background: rgba(0,0,0,0.4); padding: 30px; }
        .neon-btn { background: var(--bbl); color: white; font-weight: 700; border-radius: 20px; padding: 18px; width: 100%; text-transform: uppercase; font-size: 11px; letter-spacing: 2px; border:none; cursor:pointer; transition: 0.3s; text-decoration: none; display: block; text-align: center; }
        .input-node { width: 100%; padding: 16px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; outline: none; text-align: center; color: white; font-size: 14px; margin-bottom: 15px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeInUp 0.4s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }
        .soc-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 20px; padding: 18px 25px; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: 700; font-size: 11px; text-transform: uppercase; color: rgba(255,255,255,0.8); text-decoration: none; }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="max-w-[450px] mx-auto min-h-screen relative">

        <div id="welcome-node" class="flex flex-col items-start p-8 space-y-10 pt-16">
            <div class="syncopate-font"><h1 class="text-4xl text-white leading-none">BHARAT</h1><h2 class="text-3xl text-orange-500 leading-none">BATTLE LEAGUE</h2></div>
            <p class="text-[9px] text-white/30 uppercase font-black tracking-[0.5em]">Elite Network Portal</p>
            <div class="dna-box w-full"><p class="text-[9px] text-orange-500 font-bold uppercase tracking-widest mb-3">Elite Arena Portal</p><p class="text-[13px] text-white/70">Join India's supreme Esports ecosystem. Real-time tracking for high-stakes matches.</p></div>
            <div class="flex gap-4 w-full">
                <a href="https://www.instagram.com/biharbattleleague" target="_blank" class="soc-btn flex-1">INSTAGRAM</a>
                <a href="https://youtube.com/@songheartstation" target="_blank" class="soc-btn flex-1">YOUTUBE</a>
            </div>
            <button onclick="enterArena()" class="neon-btn">ENTER SYSTEM NODE</button>
        </div>

        <div id="auth-screen" class="hidden fixed inset-0 z-[500] bg-[#020617] flex items-center justify-center p-8 text-center">
            <div class="w-full max-w-sm glass-panel p-10 border border-orange-500/20 shadow-2xl">
                <h1 class="text-6xl bbl-logo-text mb-2 italic">BBL</h1>
                <div class="space-y-4 mt-8">
                    <div id="signup-fields" class="hidden"><input type="text" id="auth-username" placeholder="Nickname" class="input-node"></div>
                    <input type="email" id="auth-email" placeholder="Email" class="input-node">
                    <input type="password" id="auth-pass" placeholder="Password" class="input-node">
                    <button onclick="processAuth()" id="auth-btn" class="neon-btn !p-4 !text-xs">ENTER ARENA</button>
                    <p id="toggle-text" class="text-[10px] text-white/30 uppercase mt-8 cursor-pointer" onclick="toggleAuthMode()">New Player? <span class="text-orange-500 font-bold">Register</span></p>
                </div>
            </div>
        </div>

        <header id="main-header" class="hidden sticky top-0 z-[100] bg-[#020617]/90 backdrop-blur-xl px-6 py-5 flex justify-between items-center border-b border-white/5">
            <h2 class="text-xl font-bold bbl-logo-text italic">BBL LOBBY</h2>
            <div class="glass-panel px-3 py-1.5 border-orange-500/20 flex items-center gap-3">
                <p class="text-xs font-bold text-orange-400">₹<span id="u-bal">0</span></p>
                <img id="h-av" class="w-8 h-8 rounded-full border border-orange-500" onclick="switchTab('wallet')">
            </div>
        </header>

        <main id="main-content" class="hidden p-5 pb-32">
            <div id="tab-home" class="tab-content active"><div id="match-list" class="space-y-8"></div></div>
            <div id="tab-my" class="tab-content">
                <h3 class="text-center text-orange-500 font-bold mb-6 italic uppercase tracking-widest">Joined Matches</h3>
                <div id="my-match-list" class="space-y-8"></div>
            </div>
            <div id="tab-wallet" class="tab-content text-center">
                <div class="glass-panel p-10 border-l-4 border-orange-500">
                    <p class="text-[10px] text-white/40 uppercase mb-1">Character UID</p>
                    <p id="wallet-uid" class="text-xs font-bold text-white mb-8 tracking-widest">---</p>
                    <h3 class="text-6xl font-bold text-orange-500 italic mb-10">₹<span id="wallet-display">0</span></h3>
                    <div class="space-y-4">
                        <a href="https://thebiharupdate.vercel.app/payout" class="neon-btn">Withdraw Reward</a>
                        <a href="https://wa.me/919472641762" target="_blank" class="soc-btn w-full !text-[#25d366] !border-[#25d366]/20">WhatsApp Support</a>
                        <button onclick="logoutUser()" class="w-full mt-6 text-[10px] text-white/20 font-bold uppercase tracking-[0.3em]">Logout Account</button>
                    </div>
                </div>
            </div>
        </main>

        <nav id="bottom-nav" class="hidden fixed bottom-0 left-0 right-0 h-20 bg-black/95 border-t border-white/5 flex justify-around items-center z-[150]">
            <button onclick="switchTab('home')" class="nav-link text-[10px] font-bold text-orange-500">HOME</button>
            <button onclick="switchTab('my')" class="nav-link text-[10px] font-bold text-white/40">MATCHES</button>
            <button onclick="switchTab('wallet')" class="nav-link text-[10px] font-bold text-white/40">WALLET</button>
        </nav>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDiHxA8fXHVTAKFSU1UMobZMY_Kw7612fw",
            authDomain: "tournament-app-b77c0.firebaseapp.com",
            projectId: "tournament-app-b77c0",
            storageBucket: "tournament-app-b77c0.firebasestorage.app",
            messagingSenderId: "925200484535",
            appId: "1:925200484535:web:c15c87fcecb5e793bca532"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.firestore();
        let isSignup = false;

        function enterArena() { document.getElementById('welcome-node').style.display = 'none'; document.getElementById('auth-screen').classList.remove('hidden'); }
        function toggleAuthMode() { isSignup = !isSignup; document.getElementById('signup-fields').classList.toggle('hidden', !isSignup); document.getElementById('auth-btn').innerText = isSignup ? "CREATE ACCOUNT" : "ENTER ARENA"; }

        async function processAuth() {
            const email = document.getElementById('auth-email').value.trim();
            const pass = document.getElementById('auth-pass').value.trim();
            if(!email || !pass) return alert("Fill Details!");
            try {
                if (isSignup) {
                    const nick = document.getElementById('auth-username').value;
                    const res = await auth.createUserWithEmailAndPassword(email, pass);
                    await db.collection('users').doc(res.user.uid).set({ uid: res.user.uid, username: nick, wallet: 0 });
                } else { await auth.signInWithEmailAndPassword(email, pass); }
            } catch (err) { alert(err.message); }
        }

        function logoutUser() { if(confirm("Logout from BBL?")) auth.signOut().then(() => location.reload()); }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('welcome-node').style.display = 'none'; 
                document.getElementById('auth-screen').classList.add('hidden');
                document.querySelectorAll('#main-header, #main-content, #bottom-nav').forEach(el => el.classList.remove('hidden'));
                document.getElementById('wallet-uid').innerText = user.uid;
                loadData(user.uid);
            }
        });

        function loadData(uid) {
            db.collection('users').doc(uid).onSnapshot(doc => {
                if(!doc.exists) return; const d = doc.data();
                document.getElementById('u-bal').innerText = d.wallet || 0;
                document.getElementById('wallet-display').innerText = d.wallet || 0;
                document.getElementById('h-av').src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${d.username || 'BBL'}`;
            });

            db.collection('matches').orderBy('createdAt', 'desc').onSnapshot(snap => {
                const list = document.getElementById('match-list');
                const myList = document.getElementById('my-match-list');
                list.innerHTML = ""; myList.innerHTML = "";

                snap.forEach(mDoc => {
                    const m = mDoc.data(); const mId = mDoc.id;
                    db.collection('matches').doc(mId).collection('participants').doc(uid).get().then(pDoc => {
                        const hasJoined = pDoc.exists;
                        const cardHTML = `
                            <div class="glass-panel overflow-hidden border-white/5 mb-6">
                                <img src="${m.img || 'https://via.placeholder.com/400x180'}" class="w-full h-32 object-cover">
                                <div class="p-6">
                                    <h4 class="text-xl font-bold bbl-logo-text mb-2 italic uppercase">${m.title}</h4>
                                    <div class="flex justify-between text-[10px] mb-4 text-orange-500 font-bold italic uppercase">
                                        <span>Prize Pool: ₹${m.prizePool}</span>
                                        <span>Entry Fee: ₹${m.fee}</span>
                                    </div>
                                    ${hasJoined ? 
                                        `<div class="bg-orange-500/10 p-4 rounded-xl border border-orange-500/20 mb-3 text-center">
                                            <p class="text-[9px] text-orange-500 font-bold mb-1 uppercase tracking-widest">Room Credentials</p>
                                            <p class="text-xs">ID: ${m.roomId || 'WAIT'} | PASS: ${m.roomPass || 'WAIT'}</p>
                                        </div>` : 
                                        `<button onclick="joinMatch('${mId}', ${m.fee})" class="neon-btn !p-3 !text-[10px]">Join Match</button>`
                                    }
                                </div>
                            </div>`;
                        list.innerHTML += cardHTML;
                        if(hasJoined) myList.innerHTML += cardHTML;
                    });
                });
            });
        }

        async function joinMatch(id, fee) {
            const uRef = db.collection('users').doc(auth.currentUser.uid);
            const uDoc = await uRef.get();
            if(uDoc.data().wallet < fee) return alert("Low Balance!");
            if(confirm("Join Match?")){
                try {
                    await db.runTransaction(async (t) => {
                        const freshU = await t.get(uRef);
                        t.update(uRef, { wallet: freshU.data().wallet - fee });
                        t.set(db.collection('matches').doc(id).collection('participants').doc(auth.currentUser.uid), { uid: auth.currentUser.uid, username: freshU.data().username, joinedAt: Date.now() });
                    });
                    alert("Joined!");
                } catch(e) { alert("Join Failed!"); }
            }
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('tab-' + t).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.replace('text-orange-500', 'text-white/40'));
            event.currentTarget.classList.replace('text-white/40', 'text-orange-500');
        }
    </script>
</body>
</html>
