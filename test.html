<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bihari Battle League | Pro Gaming Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0c15;
            font-family: 'Inter', sans-serif;
            color: #fff;
            overflow-x: hidden;
        }
        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(45,156,219,0.12), rgba(10,12,21,1));
            z-index: -1;
        }
        .glow {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(45,156,219,0.2), transparent);
            border-radius: 50%;
            filter: blur(80px);
            animation: float 10s ease-in-out infinite;
            z-index: -1;
        }
        @keyframes float {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.4; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.7; }
        }
        .app {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px 16px;
            position: relative;
            z-index: 2;
        }
        .premium-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .logo h1 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #2d9cdb, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo p {
            font-size: 0.6rem;
            color: rgba(255,255,255,0.5);
        }
        .user-avatar {
            background: linear-gradient(135deg, #2d9cdb, #1e40af);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid rgba(45,156,219,0.5);
        }
        .premium-wallet {
            background: linear-gradient(135deg, rgba(30,45,60,0.9), rgba(20,30,45,0.95));
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(45,156,219,0.3);
        }
        .wallet-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .wallet-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: rgba(255,255,255,0.6);
        }
        .wallet-icon {
            font-size: 1.5rem;
            color: #facc15;
        }
        .wallet-amount {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #facc15, #fbbf24);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 10px 0;
        }
        .withdraw-btn {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border: none;
            padding: 12px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }
        .stat-premium {
            background: rgba(15,25,40,0.6);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 14px;
            text-align: center;
            border: 1px solid rgba(45,156,219,0.2);
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: #2d9cdb;
        }
        .stat-label {
            font-size: 0.6rem;
            color: rgba(255,255,255,0.6);
            margin-top: 5px;
        }
        .premium-tabs {
            display: flex;
            gap: 8px;
            background: rgba(15,25,40,0.6);
            backdrop-filter: blur(8px);
            padding: 6px;
            border-radius: 60px;
            margin-bottom: 20px;
        }
        .premium-tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            color: rgba(255,255,255,0.7);
        }
        .premium-tab.active {
            background: linear-gradient(135deg, #2d9cdb, #1e40af);
            color: white;
        }
        .tournament-premium {
            background: linear-gradient(135deg, rgba(20,30,45,0.9), rgba(15,25,40,0.95));
            border-radius: 24px;
            padding: 18px;
            margin-bottom: 14px;
            border: 1px solid rgba(45,156,219,0.2);
        }
        .tournament-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .tournament-title {
            font-size: 1rem;
            font-weight: 700;
        }
        .prize-badge {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
        }
        .tournament-details {
            display: flex;
            justify-content: space-between;
            margin: 12px 0;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.7);
        }
        .progress-bar {
            background: rgba(255,255,255,0.1);
            height: 6px;
            border-radius: 3px;
            margin: 10px 0;
        }
        .progress-fill {
            background: linear-gradient(90deg, #2d9cdb, #06b6d4);
            height: 100%;
            border-radius: 3px;
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 600;
        }
        .status-live { background: #10b981; animation: pulse 1.5s infinite; }
        .status-upcoming { background: #f59e0b; }
        .status-completed { background: #6b7280; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
        .room-premium {
            background: rgba(16,185,129,0.1);
            border: 1px solid #10b981;
            border-radius: 16px;
            padding: 12px;
            margin-top: 12px;
        }
        .room-code {
            background: rgba(0,0,0,0.5);
            padding: 8px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            font-family: monospace;
        }
        .copy-premium {
            background: #2d9cdb;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.65rem;
            cursor: pointer;
        }
        .btn-premium {
            background: linear-gradient(135deg, #2d9cdb, #1e40af);
            border: none;
            padding: 12px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
        }
        .btn-premium:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .input-premium {
            background: rgba(15,25,40,0.8);
            border: 1px solid rgba(45,156,219,0.3);
            padding: 14px 18px;
            border-radius: 40px;
            color: white;
            width: 100%;
            margin-bottom: 12px;
        }
        .input-premium:focus {
            outline: none;
            border-color: #2d9cdb;
        }
        .toast-premium {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #1e293b, #0f172a);
            padding: 12px 24px;
            border-radius: 60px;
            color: white;
            font-size: 0.8rem;
            z-index: 1000;
            border-left: 4px solid #2d9cdb;
            animation: slideUp 0.3s;
        }
        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(100px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }
        .loading-spinner { text-align: center; padding: 40px; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(45,156,219,0.3);
            border-top-color: #2d9cdb;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .leaderboard-item, .transaction-item {
            background: rgba(15,25,40,0.6);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .rank-1 { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .rank-2 { background: linear-gradient(135deg, #94a3b8, #64748b); }
        .rank-3 { background: linear-gradient(135deg, #cd7b4e, #b45309); }
        .mt-2 { margin-top: 8px; }
        .pending-badge {
            background: #f59e0b20;
            padding: 8px;
            border-radius: 12px;
            margin-top: 10px;
            font-size: 0.7rem;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="gradient-bg"></div>
<div class="glow"></div>
<div id="app" class="app">Loading...</div>

<script type="module">
  // Firebase Config
const firebaseConfig = {
    apiKey: "AIzaSyDiHxA8fXHVTAKFSU1UMobZMY_Kw7612fw",
    authDomain: "tournament-app-b77c0.firebaseapp.com",
    projectId: "tournament-app-b77c0",
    storageBucket: "tournament-app-b77c0.firebasestorage.app",
    messagingSenderId: "925200484535",
    appId: "1:925200484535:web:c15c87fcecb5e793bca532"
};

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, onSnapshot, addDoc, serverTimestamp, orderBy, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let unsubs = [];
const appDiv = document.getElementById('app');

function toast(msg, isError = false) {
    const t = document.createElement('div');
    t.className = 'toast-premium';
    t.innerHTML = `${isError ? '❌' : '✅'} ${msg}`;
    t.style.borderLeftColor = isError ? '#ef4444' : '#10b981';
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2500);
}

function copyText(text) {
    navigator.clipboard.writeText(text);
    toast("Copied!");
}
window.copyText = copyText;

// Withdrawal Request - Sirf request bhejega, aap admin se approve karoge
async function requestWithdraw() {
    if (!currentUser) return;
    const amount = parseInt(prompt("Enter withdrawal amount (Min ₹100):", "100"));
    if (!amount || amount <= 0) {
        toast("Invalid amount!", true);
        return;
    }
    const userRef = doc(db, "users", currentUser.uid);
    const userSnap = await getDoc(userRef);
    const wallet = userSnap.data()?.wallet || 0;
    
    if (amount > wallet) {
        toast("Insufficient balance!", true);
        return;
    }
    if (amount < 100) {
        toast("Minimum withdrawal is ₹100", true);
        return;
    }
    
    try {
        await addDoc(collection(db, "withdrawals"), {
            uid: currentUser.uid,
            name: userSnap.data()?.name || currentUser.email.split('@')[0],
            amount: amount,
            status: "pending",
            requestedAt: serverTimestamp()
        });
        toast(`Withdrawal request of ₹${amount} sent to admin!`);
    } catch(e) {
        toast("Failed to send request", true);
    }
}
window.requestWithdraw = requestWithdraw;

function render() {
    if (!currentUser) {
        renderLogin();
    } else {
        renderDashboard();
    }
}

function renderLogin() {
    appDiv.innerHTML = `
        <div class="premium-header">
            <div class="logo">
                <h1>BIHARI BATTLE</h1>
                <p>ELITE GAMING ARENA</p>
            </div>
        </div>
        <div style="background: linear-gradient(135deg, rgba(20,30,45,0.9), rgba(15,25,40,0.9)); border-radius: 32px; padding: 30px;">
            <h2 style="margin-bottom: 20px;">Welcome Back</h2>
            <input type="email" id="email" class="input-premium" placeholder="Email Address" />
            <input type="password" id="password" class="input-premium" placeholder="Password" />
            <button id="loginBtn" class="btn-premium" style="margin-bottom: 12px;">Sign In</button>
            <button id="signupBtn" style="background: transparent; border: 1px solid #2d9cdb;" class="btn-premium">Create Account</button>
            <p style="text-align: center; margin-top: 20px; font-size: 0.65rem; color: rgba(255,255,255,0.5);">
                <i class="fas fa-trophy"></i> Join tournaments & win big prizes!
            </p>
        </div>
    `;
    
    document.getElementById('loginBtn')?.addEventListener('click', async () => {
        const email = document.getElementById('email').value;
        const pwd = document.getElementById('password').value;
        try {
            await signInWithEmailAndPassword(auth, email, pwd);
            toast("Welcome back!");
        } catch(e) {
            toast(e.message, true);
        }
    });
    
    document.getElementById('signupBtn')?.addEventListener('click', async () => {
        const email = document.getElementById('email').value;
        const pwd = document.getElementById('password').value;
        if (pwd.length < 6) {
            toast("Password must be 6+ characters", true);
            return;
        }
        try {
            const cred = await createUserWithEmailAndPassword(auth, email, pwd);
            await setDoc(doc(db, "users", cred.user.uid), {
                name: email.split('@')[0],
                wallet: 0,
                email: email,
                joined: 0,
                wins: 0,
                createdAt: serverTimestamp()
            });
            toast("Account created! Admin will add balance for paid tournaments.");
        } catch(e) {
            toast(e.message, true);
        }
    });
          }
  async function renderDashboard() {
    const uid = currentUser.uid;
    const userRef = doc(db, "users", uid);
    
    let walletBalance = 0;
    let joinedCount = 0;
    let winsCount = 0;
    
    const updateUserData = async () => {
        const snap = await getDoc(userRef);
        if (snap.exists()) {
            walletBalance = snap.data().wallet || 0;
            joinedCount = snap.data().joined || 0;
            winsCount = snap.data().wins || 0;
            document.getElementById('walletAmount')?.innerText = walletBalance;
            document.getElementById('joinedCount')?.innerText = joinedCount;
            document.getElementById('winsCount')?.innerText = winsCount;
        }
    };
    await updateUserData();
    
    // Tournaments List
    const tournamentsQuery = query(collection(db, "tournaments"), orderBy("time", "desc"));
    if (unsubs[0]) unsubs[0]();
    unsubs[0] = onSnapshot(tournamentsQuery, (snapshot) => {
        const container = document.getElementById('tournamentList');
        if (!container) return;
        if (snapshot.empty) {
            container.innerHTML = '<div class="loading-spinner"><div class="spinner"></div><p>No tournaments available</p></div>';
            return;
        }
        let html = '';
        snapshot.forEach(docSnap => {
            const t = docSnap.data();
            const id = docSnap.id;
            const filled = t.players ? Object.keys(t.players).length : 0;
            const max = t.maxPlayers || 10;
            const status = t.status || 'Upcoming';
            const joined = t.players && t.players[uid];
            const hasRoom = t.roomId && t.roomId !== '';
            const progress = (filled / max) * 100;
            
            html += `
                <div class="tournament-premium">
                    <div class="tournament-header">
                        <span class="tournament-title">🏆 ${t.title || 'Free Fire Battle'}</span>
                        <span class="prize-badge">₹${t.prize}</span>
                    </div>
                    <div class="tournament-details">
                        <span>💰 Entry: ₹${t.fee}</span>
                        <span>⏰ ${t.time}</span>
                    </div>
                    <div style="margin: 8px 0;">
                        <div style="display: flex; justify-content: space-between; font-size: 0.7rem;">
                            <span>👥 ${filled}/${max}</span>
                            <span>${Math.round(progress)}% filled</span>
                        </div>
                        <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 8px;">
                        <span class="status-badge status-${status.toLowerCase()}">${status === 'Live' ? '🔴 LIVE' : status === 'Upcoming' ? '⏰ UPCOMING' : '✅ COMPLETED'}</span>
                    </div>
            `;
            
            if (status === 'Live' && hasRoom) {
                html += `
                    <div class="room-premium">
                        <div><i class="fas fa-gamepad"></i> <strong>MATCH ROOM</strong></div>
                        <div class="room-code">
                            <span><i class="fas fa-door-open"></i> ${t.roomId}</span>
                            <span class="copy-premium" onclick="copyText('${t.roomId}')">Copy</span>
                        </div>
                        <div class="room-code">
                            <span><i class="fas fa-key"></i> ${t.password || 'No password'}</span>
                            ${t.password ? `<span class="copy-premium" onclick="copyText('${t.password}')">Copy</span>` : ''}
                        </div>
                    </div>
                `;
            }
            
            if (status === 'Upcoming' && !joined && filled < max) {
                html += `<button class="btn-premium join-btn mt-2" data-id="${id}" data-fee="${t.fee}" data-title="${t.title}" style="margin-top: 12px;">⚡ Join Match - ₹${t.fee}</button>`;
            } else if (status === 'Upcoming' && joined) {
                html += `<button class="btn-premium" disabled style="margin-top: 12px; background: #10b981;">✓ Ready for Battle!</button>`;
            } else if (status === 'Live' && joined && hasRoom) {
                html += `<button class="btn-premium" disabled style="margin-top: 12px; background: #10b981;">🎮 Join Now - Room Above</button>`;
            }
            
            html += `</div>`;
        });
        container.innerHTML = html;
        
        document.querySelectorAll('.join-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const matchId = btn.dataset.id;
                const fee = parseInt(btn.dataset.fee);
                const title = btn.dataset.title;
                const userSnap = await getDoc(userRef);
                if ((userSnap.data()?.wallet || 0) < fee) {
                    toast("Insufficient balance! Contact admin to add funds.", true);
                    return;
                }
                const matchRef = doc(db, "tournaments", matchId);
                const matchSnap = await getDoc(matchRef);
                const players = matchSnap.data()?.players || {};
                if (players[uid]) {
                    toast("Already joined!", true);
                    return;
                }
                if (Object.keys(players).length >= (matchSnap.data()?.maxPlayers || 10)) {
                    toast("Match is full!", true);
                    return;
                }
                try {
                    await updateDoc(matchRef, { [`players.${uid}`]: true });
                    await updateDoc(userRef, { wallet: (userSnap.data()?.wallet || 0) - fee });
                    await updateDoc(userRef, { joined: joinedCount + 1 });
                    await addDoc(collection(db, "transactions"), {
                        uid, type: "joined", amount: fee, matchId, title, description: `Joined ${title}`, status: "completed", timestamp: serverTimestamp()
                    });
                    toast(`Joined ${title}! -₹${fee}`);
                    updateUserData();
                } catch(e) {
                    toast("Failed to join", true);
                }
            });
        });
    });
    
    // My Matches
    const myQuery = query(collection(db, "tournaments"));
    if (unsubs[1]) unsubs[1]();
    unsubs[1] = onSnapshot(myQuery, (snapshot) => {
        const container = document.getElementById('myMatchesList');
        if (!container) return;
        let html = '';
        let has = false;
        snapshot.forEach(docSnap => {
            const t = docSnap.data();
            if (t.players && t.players[uid]) {
                has = true;
                const hasRoom = t.roomId && t.roomId !== '';
                html += `
                    <div class="tournament-premium">
                        <div class="tournament-header">
                            <span class="tournament-title">🎮 ${t.title}</span>
                            <span class="status-badge status-${t.status?.toLowerCase()}">${t.status}</span>
                        </div>
                        <div class="tournament-details">
                            <span>⏰ ${t.time}</span>
                            <span>💰 ₹${t.fee} | 🏆 ₹${t.prize}</span>
                        </div>
                `;
                if (t.status === 'Live' && hasRoom) {
                    html += `
                        <div class="room-premium">
                            <div><i class="fas fa-gamepad"></i> <strong>YOUR ROOM</strong></div>
                            <div class="room-code">
                                <span><i class="fas fa-door-open"></i> ${t.roomId}</span>
                                <span class="copy-premium" onclick="copyText('${t.roomId}')">Copy</span>
                            </div>
                            <div class="room-code">
                                <span><i class="fas fa-key"></i> ${t.password || 'No password'}</span>
                                ${t.password ? `<span class="copy-premium" onclick="copyText('${t.password}')">Copy</span>` : ''}
                            </div>
                        </div>
                    `;
                } else if (t.status === 'Live' && !hasRoom) {
                    html += `<div class="room-premium" style="border-color: #f59e0b;"><i class="fas fa-hourglass-half"></i> Admin adding room details...</div>`;
                } else if (t.status === 'Upcoming') {
                    html += `<div class="room-premium" style="border-color: #f59e0b;"><i class="fas fa-clock"></i> Room appears when match goes LIVE!</div>`;
                }
                html += `</div>`;
            }
        });
        container.innerHTML = has ? html : '<div class="loading-spinner"><p>No matches joined yet</p></div>';
    });
            // Leaderboard
        const leaderQuery = query(collection(db, "leaderboard"), orderBy("points", "desc"));
        if (unsubs[2]) unsubs[2]();
        unsubs[2] = onSnapshot(leaderQuery, (snapshot) => {
            const container = document.getElementById('leaderboardList');
            if (!container) return;
            if (snapshot.empty) {
                container.innerHTML = '<div class="loading-spinner"><p>No rankings yet</p></div>';
                return;
            }
            let rank = 1;
            let html = '';
            snapshot.forEach(docSnap => {
                const d = docSnap.data();
                let rankClass = '';
                if (rank === 1) rankClass = 'rank-1';
                else if (rank === 2) rankClass = 'rank-2';
                else if (rank === 3) rankClass = 'rank-3';
                html += `<div class="leaderboard-item ${rankClass}"><span>#${rank} ${d.name}</span><span><i class="fas fa-fire"></i> ${d.points} pts</span></div>`;
                rank++;
            });
            container.innerHTML = html;
        });
        
        // Transactions History
        const transQuery = query(collection(db, "transactions"), where("uid", "==", uid), orderBy("timestamp", "desc"));
        if (unsubs[3]) unsubs[3]();
        unsubs[3] = onSnapshot(transQuery, (snapshot) => {
            const container = document.getElementById('historyList');
            if (!container) return;
            if (snapshot.empty) {
                container.innerHTML = '<div class="loading-spinner"><p>No transactions</p></div>';
                return;
            }
            let html = '';
            snapshot.forEach(docSnap => {
                const t = docSnap.data();
                const date = t.timestamp ? new Date(t.timestamp.toDate()).toLocaleString() : 'Now';
                const icon = t.type === 'joined' ? '🎮' : '💰';
                const color = t.type === 'joined' ? '#f97316' : '#10b981';
                html += `<div class="transaction-item" style="border-left: 3px solid ${color};"><span>${icon} ${t.description || (t.type === 'joined' ? 'Joined Tournament' : 'Deposit')}</span><span>₹${t.amount}</span><span style="font-size: 9px;">${date}</span></div>`;
            });
            container.innerHTML = html;
        });
        
        // Withdrawal Status
        const withdrawQuery = query(collection(db, "withdrawals"), where("uid", "==", uid), orderBy("requestedAt", "desc"));
        let withdrawStatusHtml = "";
        const unsubWithdraw = onSnapshot(withdrawQuery, (snapshot) => {
            if (!snapshot.empty) {
                const latest = snapshot.docs[0].data();
                if (latest.status === "pending") {
                    withdrawStatusHtml = `<div class="pending-badge"><i class="fas fa-clock"></i> Withdrawal request pending (₹${latest.amount})</div>`;
                } else if (latest.status === "approved") {
                    withdrawStatusHtml = `<div class="pending-badge" style="background: #10b98120;"><i class="fas fa-check-circle"></i> Withdrawal approved! (₹${latest.amount})</div>`;
                } else if (latest.status === "rejected") {
                    withdrawStatusHtml = `<div class="pending-badge" style="background: #ef444420;"><i class="fas fa-times-circle"></i> Withdrawal rejected (₹${latest.amount})</div>`;
                }
                const statusDiv = document.getElementById('withdrawStatus');
                if (statusDiv) statusDiv.innerHTML = withdrawStatusHtml;
            }
        });
        unsubs.push(unsubWithdraw);
        
        // Main UI
        appDiv.innerHTML = `
            <div class="premium-header">
                <div class="logo">
                    <h1>BIHARI BATTLE</h1>
                    <p>ELITE GAMING ARENA</p>
                </div>
                <div class="user-avatar" onclick="document.getElementById('logoutBtn').click()">
                    <i class="fas fa-user" style="font-size: 1.2rem;"></i>
                </div>
            </div>
            
            <div class="premium-wallet">
                <div class="wallet-top">
                    <span class="wallet-label">TOTAL BALANCE</span>
                    <i class="fas fa-coins wallet-icon"></i>
                </div>
                <div class="wallet-amount" id="walletAmount">₹${walletBalance}</div>
                <div id="withdrawStatus"></div>
                <button id="withdrawBtn" class="withdraw-btn"><i class="fas fa-arrow-down"></i> Request Withdrawal</button>
                <p style="font-size: 0.6rem; text-align: center; margin-top: 8px; color: rgba(255,255,255,0.4);">
                    Min withdrawal ₹100 | Admin approves within 24hrs
                </p>
            </div>
            
            <div class="stats-grid">
                <div class="stat-premium"><div class="stat-value" id="joinedCount">${joinedCount}</div><div class="stat-label">TOURNAMENTS</div></div>
                <div class="stat-premium"><div class="stat-value" id="winsCount">${winsCount}</div><div class="stat-label">WINS</div></div>
                <div class="stat-premium"><div class="stat-value">🏆</div><div class="stat-label">RANKING</div></div>
            </div>
            
            <div class="premium-tabs">
                <div class="premium-tab active" data-tab="tournaments">🏆 Tournaments</div>
                <div class="premium-tab" data-tab="mymatches">🎮 My Matches</div>
                <div class="premium-tab" data-tab="leaderboard">📊 Leaderboard</div>
                <div class="premium-tab" data-tab="history">💰 History</div>
            </div>
            
            <div id="tournamentsPanel"><div id="tournamentList" class="loading-spinner"><div class="spinner"></div><p>Loading tournaments...</p></div></div>
            <div id="mymatchesPanel" style="display:none;"><div id="myMatchesList" class="loading-spinner"><div class="spinner"></div><p>Loading...</p></div></div>
            <div id="leaderboardPanel" style="display:none;"><div id="leaderboardList" class="loading-spinner"><div class="spinner"></div><p>Loading...</p></div></div>
            <div id="historyPanel" style="display:none;"><div id="historyList" class="loading-spinner"><div class="spinner"></div><p>Loading...</p></div></div>
            <button id="logoutBtn" style="display: none;"></button>
        `;
        
        document.getElementById('logoutBtn')?.addEventListener('click', () => {
            signOut(auth);
            currentUser = null;
            render();
        });
        
        document.getElementById('withdrawBtn')?.addEventListener('click', () => {
            requestWithdraw();
        });
        
        document.querySelectorAll('.premium-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const target = tab.dataset.tab;
                document.getElementById('tournamentsPanel').style.display = target === 'tournaments' ? 'block' : 'none';
                document.getElementById('mymatchesPanel').style.display = target === 'mymatches' ? 'block' : 'none';
                document.getElementById('leaderboardPanel').style.display = target === 'leaderboard' ? 'block' : 'none';
                document.getElementById('historyPanel').style.display = target === 'history' ? 'block' : 'none';
                document.querySelectorAll('.premium-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
            });
        });
    }
    
    onAuthStateChanged(auth, (user) => {
        currentUser = user;
        render();
    });
</script>
</body>
</html>
