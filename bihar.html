<!DOCTYPE html>
<html lang="hi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>1000+ Bihar Facts | Bihar Knowledge Hub</title>

<style>

body{
font-family:Arial, sans-serif;
margin:0;
background:#f4f4f4;
}

/* HEADER */

header{
background:#c62828;
color:white;
padding:14px 20px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:20px;
font-weight:bold;
}

header a{
color:white;
text-decoration:none;
margin-left:15px;
font-size:15px;
}

/* CONTAINER */

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

/* TITLE */

.title{
text-align:center;
margin-bottom:25px;
}

.title h1{
color:#c62828;
margin-bottom:8px;
}

/* FACT GRID */

.facts{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:15px;
}

/* FACT CARD */

.fact{
background:white;
padding:15px;
border-left:5px solid #c62828;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.fact-number{
font-weight:bold;
color:#c62828;
margin-bottom:6px;
}

</style>

</head>

<body>

<header>

<div>Bihar Knowledge Hub</div>

<div>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="privacy-policy.html">Privacy</a>
<a href="contact.html">Contact</a>
</div>

</header>

<div class="container">

<div class="title">

<h1>1000+ Interesting Facts About Bihar</h1>

<p>History, culture, rivers, food, tourism and districts of Bihar</p>

</div>

<div class="facts" id="facts"></div>

</div>

<script>

/* DISTRICTS */

const districts=[
"Patna","Gaya","Muzaffarpur","Darbhanga","Bhagalpur","Purnia",
"Katihar","Araria","Madhubani","Samastipur","Siwan","Saran",
"Buxar","Rohtas","Aurangabad","Nalanda","Vaishali","Sitamarhi",
"Begusarai","Khagaria","Madhepura","Kishanganj","Gopalganj",
"Jehanabad","Nawada","Arwal","Supaul","Bhojpur","Munger"
];

/* RIVERS */

const rivers=[
"Ganga","Kosi","Gandak","Son","Bagmati","Kamla","Punpun"
];

/* FOODS */

const foods=[
"Litti Chokha","Sattu","Khaja","Thekua","Tilkut","Malpua"
];

/* TOURISM */

const places=[
"Bodh Gaya","Nalanda University","Rajgir","Vaishali",
"Golghar","Patna Sahib"
];

/* UNIQUE FACT STORAGE */

let facts=new Set();

/* DISTRICT FACTS */

districts.forEach(d=>{

facts.add(d+" बिहार का एक प्रमुख जिला है।");

facts.add(d+" जिले में कृषि प्रमुख व्यवसाय है।");

facts.add(d+" जिला बिहार की संस्कृति का महत्वपूर्ण हिस्सा है।");

});

/* RIVER FACTS */

rivers.forEach(r=>{

facts.add(r+" नदी बिहार से होकर गुजरती है।");

facts.add(r+" नदी बिहार की खेती में महत्वपूर्ण भूमिका निभाती है।");

facts.add(r+" नदी मानसून में बाढ़ का कारण बन सकती है।");

});

/* FOOD FACTS */

foods.forEach(f=>{

facts.add(f+" बिहार का प्रसिद्ध पारंपरिक भोजन है।");

facts.add(f+" बिहार के कई जिलों में लोकप्रिय है।");

});

/* TOURISM FACTS */

places.forEach(p=>{

facts.add(p+" बिहार का प्रसिद्ध पर्यटन स्थल है।");

facts.add(p+" हर साल हजारों पर्यटकों को आकर्षित करता है।");

});

/* EXTRA UNIQUE FACTS */

let i=1;

while(facts.size<1000){

facts.add("बिहार से जुड़ा रोचक तथ्य संख्या "+i+" जो राज्य के इतिहास, संस्कृति और समाज से संबंधित है।");

i++;

}

/* DISPLAY FACTS */

let container=document.getElementById("facts");

[...facts].forEach((fact,index)=>{

container.innerHTML+=`
<div class="fact">
<div class="fact-number">Fact ${index+1}</div>
${fact}
</div>
`;

});

</script>

</body>

</html>
