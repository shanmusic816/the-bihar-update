<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBL | Master Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon: #ff6b00; --bg: #020406; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .brand-font { font-family: 'Syncopate', sans-serif; text-transform: uppercase; font-style: italic; }
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; }
        .input-node { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 14px; border-radius: 12px; width: 100%; outline: none; font-size: 11px; color: white; margin-bottom: 10px; }
        .tab-btn { opacity: 0.4; transition: 0.3s; padding-bottom: 10px; font-size: 10px; font-weight: 900; text-transform: uppercase; border-bottom: 2px solid transparent; }
        .tab-btn.active { opacity: 1; color: var(--neon); border-bottom: 2px solid var(--neon); }
        .a-section { display: none; }
        .a-section.active { display: block; }
        .player-badge { background: rgba(255,107,0,0.1); border: 1px solid rgba(255,107,0,0.2); padding: 5px 10px; border-radius: 8px; font-size: 9px; margin: 3px; display: inline-block; color: #ff6b00; font-weight: 900; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-6">

    <div id="admin-auth" class="fixed inset-0 bg-black z-[3000] flex items-center justify-center p-6 text-center">
        <div class="glass p-10 w-full max-w-sm border-orange-500/20">
            <h2 class="brand-font text-orange-500 text-[10px] mb-8 tracking-widest leading-none">Bharat Master Access</h2>
            <input type="password" id="adm-pass" placeholder="Enter Control Key" class="input-node text-center mb-6">
            <button onclick="checkAdm()" class="w-full bg-orange-600 py-4 rounded-xl font-black uppercase text-[10px] tracking-widest shadow-2xl">Authorize Node</button>
        </div>
    </div>

    <div id="admin-main" class="hidden">
        <header class="flex justify-between items-center mb-8">
            <h1 class="brand-font text-orange-500 italic text-lg leading-none">Bharat Control</h1>
            <button onclick="location.reload()" class="text-[8px] opacity-30 font-black uppercase italic underline">Refresh Hub</button>
        </header>

        <nav class="flex gap-6 mb-8 border-b border-white/5 overflow-x-auto pb-1 text-center">
            <button onclick="aTab('matches')" class="tab-btn active" id="btn-matches">Matches</button>
            <button onclick="aTab('finance')" class="tab-btn" id="btn-finance">Add Cash</button>
            <button onclick="aTab('claims')" class="tab-btn" id="btn-claims">Payouts</button>
        </nav>

        <div id="sec-matches" class="a-section active">
            <div class="glass p-6 mb-8 border-orange-500/20">
                <h3 class="text-[9px] font-black opacity-30 uppercase mb-4 tracking-widest italic text-center">Create Tournament</h3>
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="m-t" placeholder="Match Title" class="input-node">
                    <input type="number" id="m-f" placeholder="Fee (₹)" class="input-node">
                    <input type="number" id="m-p" placeholder="Prize Pool (₹)" class="input-node">
                    <input type="text" id="m-i" placeholder="Banner URL" class="input-node">
                    <button onclick="createM()" class="col-span-2 bg-green-600 py-4 rounded-xl font-black uppercase text-[10px] italic">Launch Match</button>
                </div>
            </div>
            
            <h3 class="text-[9px] font-black opacity-30 mb-4 uppercase italic">Live Tournament Status</h3>
            <div id="admin-m-list" class="space-y-4"></div>
        </div>

        <div id="sec-finance" class="a-section">
            <h3 class="brand-font text-[9px] text-green-500 mb-4 italic uppercase">Pending Deposits (Add Cash)</h3>
            <div id="deposit-box" class="space-y-4"></div>
        </div>

        <div id="sec-claims" class="a-section">
            <h3 class="brand-font text-[9px] text-red-500 mb-4 italic uppercase tracking-widest">Reward Claims (GitHub)</h3>
            <div id="claims-box" class="space-y-4"></div>
        </div>
    </div>

<script>
    // --- SERVER CONFIG ---
    const firebaseConfig = { 
        apiKey: "AIzaSyDlHxa8FJHVTXKF5U1UMobZMY_Rw7G12fw", 
        authDomain: "tournament-app-b77c0.firebaseapp.com",
        projectId: "tournament-app-b77c0",
        databaseURL: "https://tournament-app-b77c0-default-rtdb.asia-southeast1.firebasedatabase.app",
        storageBucket: "tournament-app-b77c0.appspot.com",
        messagingSenderId: "383562657313",
        appId: "1:383562657313:web:9b97b102a90102" 
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 1. Password Protection (admin@123)
    function checkAdm() {
        if(document.getElementById('adm-pass').value === "admin@123") {
            document.getElementById('admin-auth').classList.add('hidden');
            document.getElementById('admin-main').classList.remove('hidden');
            loadAdmMatches();
        } else { alert("Access Denied!"); }
    }

    // 2. Tournament & Player UID Display Logic
    function loadAdmMatches() {
        db.collection('matches').orderBy('createdAt', 'desc').onSnapshot(snap => {
            const list = document.getElementById('admin-m-list'); list.innerHTML = "";
            snap.forEach(doc => {
                const m = doc.data(); const id = doc.id;
                
                db.collection('matches').doc(id).collection('participants').onSnapshot(pSnap => {
                    const count = pSnap.size;
                    let playerUIDs = "";
                    pSnap.forEach(pDoc => { 
                        playerUIDs += `<span class="player-badge">UID: ${pDoc.data().playerUID || 'N/A'}</span>`; 
                    });

                    const cardHtml = `
                    <div id="card-${id}" class="glass p-5 border border-white/5 mb-4 text-center">
                        <div class="flex justify-between items-start mb-4">
                            <div class="text-left">
                                <h4 class="font-black text-xs uppercase text-orange-500 italic">${m.title}</h4>
                                <p class="text-[10px] text-green-500 font-bold mt-1">JOINED: ${count} Players</p>
                            </div>
                            <button onclick="deleteM('${id}')" class="text-red-500 text-xs opacity-30">🗑️</button>
                        </div>
                        <div class="bg-black/20 p-3 rounded-lg mb-4 text-left">
                            <p class="text-[8px] opacity-30 uppercase font-black mb-2 tracking-widest">Joined Player UIDs</p>
                            <div class="flex flex-wrap">${playerUIDs || '<span class="opacity-10 text-[8px]">Waiting...</span>'}</div>
                        </div>
                        <div class="grid grid-cols-2 gap-2 mb-3">
                             <input type="text" id="rid-${id}" placeholder="Room ID" value="${m.roomId || ''}" class="input-node mb-0 py-2 text-center">
                             <input type="text" id="rps-${id}" placeholder="Room Pass" value="${m.roomPass || ''}" class="input-node mb-0 py-2 text-center">
                        </div>
                        <button onclick="updateRoom('${id}')" class="w-full bg-white/5 py-3 rounded-xl text-[9px] font-black uppercase border border-white/10 italic hover:bg-orange-600 transition">Update Room Details</button>
                    </div>`;
                    
                    const existingCard = document.getElementById(`card-${id}`);
                    if(existingCard) existingCard.outerHTML = cardHtml;
                    else list.innerHTML += cardHtml;
                });
            });
        });
    }

    async function createM() {
        const title = document.getElementById('m-t').value;
        const fee = Number(document.getElementById('m-f').value);
        const prize = Number(document.getElementById('m-p').value);
        const img = document.getElementById('m-i').value;
        if(!title || !fee) return alert("Bhai, Details bhariye!");
        await db.collection('matches').add({ title, fee, prizePool: prize, img, createdAt: Date.now(), roomId: '', roomPass: '' });
        alert("Match Published!");
    }

    async function updateRoom(id) {
        const rid = document.getElementById('rid-' + id).value;
        const rps = document.getElementById('rps-' + id).value;
        await db.collection('matches').doc(id).update({ roomId: rid, roomPass: rps });
        alert("Room Updated!");
    }

    async function deleteM(id) { if(confirm("Delete Tournament?")) await db.collection('matches').doc(id).delete(); }

    // 3. Finance Logic (Add Cash - SS Preview)
    function loadFinance() {
        db.collection('deposits').where('status', '==', 'Pending').onSnapshot(snap => {
            const box = document.getElementById('deposit-box'); box.innerHTML = "";
            if(snap.empty) box.innerHTML = "<p class='text-center opacity-20 py-10 text-xs'>No Add Cash Requests</p>";
            snap.forEach(doc => {
                const d = doc.data();
                box.innerHTML += `
                <div class="glass p-5 border border-green-500/10 mb-4">
                    <div class="flex gap-4 mb-4 items-center">
                        <img src="${d.screenshot}" class="w-16 h-16 object-cover rounded-lg border border-white/5" onclick="window.open('${d.screenshot}')">
                        <div class="flex-1 text-left">
                            <h4 class="text-[10px] font-black uppercase text-white">UID: ${d.playerUID}</h4>
                            <p class="text-[9px] text-green-500 mt-1 font-bold italic">Mob: ${d.mobile}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <input type="number" id="amt-${doc.id}" placeholder="Amount" class="input-node mb-0 py-2 text-center">
                        <button onclick="approveDep('${doc.id}','${d.playerUID}')" class="bg-green-600 px-6 rounded-xl text-[9px] font-black uppercase italic">Approve</button>
                    </div>
                </div>`;
            });
        });
    }

    async function approveDep(docId, uid) {
        const amt = Number(document.getElementById('amt-'+docId).value);
        if(!amt) return alert("Pehle amount likho!");
        const uRef = db.collection('users').doc(uid);
        try {
            await db.runTransaction(async t => {
                const snap = await t.get(uRef);
                const currentBal = snap.data().wallet || 0;
                t.update(uRef, { wallet: currentBal + amt });
                t.update(db.collection('deposits').doc(docId), { status: 'Approved', amount: amt });
            });
            alert("Cash Added Successfully!");
        } catch(e) { alert("Error: User UID not found in DB!"); }
    }

    // 4. Payout Reward Logic (Rank Claims)
    function loadClaims() {
        db.collection('payout_claims').where('status', '==', 'Pending').onSnapshot(snap => {
            const box = document.getElementById('claims-box'); box.innerHTML = "";
            if(snap.empty) box.innerHTML = "<p class='opacity-20 text-[10px] text-center py-10'>No Payout Requests</p>";
            snap.forEach(doc => {
                const p = doc.data(); const id = doc.id;
                box.innerHTML += `
                <div class="glass p-5 border border-red-500/10 mb-4">
                    <div class="flex gap-4 mb-4">
                        <img src="${p.screenshot}" class="w-20 h-20 object-cover rounded-xl border border-orange-500/20" onclick="window.open('${p.screenshot}')">
                        <div class="flex-1 text-left">
                            <h4 class="text-[10px] font-black uppercase italic text-white">${p.name}</h4>
                            <p class="text-[8px] text-orange-500 font-bold mt-1">UID: ${p.uid}</p>
                            <div class="bg-white/5 p-2 rounded mt-2 flex justify-between items-center">
                                <p class="text-[9px] font-black text-green-400">${p.upi}</p>
                                <button onclick="copyUPI('${p.upi}')" class="text-[7px] underline opacity-50 uppercase font-black">Copy</button>
                            </div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="pStatus('${id}','Paid')" class="bg-green-600 py-3 rounded-xl text-[9px] font-black uppercase italic">Paid ✅</button>
                        <button onclick="pStatus('${id}','Rejected')" class="bg-red-600/20 text-red-500 py-3 rounded-xl text-[9px] font-black uppercase italic">Reject</button>
                    </div>
                </div>`;
            });
        });
    }

    async function pStatus(id, status) {
        if(confirm("Confirm action?")) { await db.collection('payout_claims').doc(id).update({ status }); alert("Status Updated!"); }
    }

    function copyUPI(txt) { navigator.clipboard.writeText(txt); alert("UPI Copied!"); }

    // Tab Logic
    function aTab(t) {
        document.querySelectorAll('.a-section').forEach(s => s.classList.remove('active'));
        document.getElementById('sec-' + t).classList.add('active');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + t).classList.add('active');
        if(t === 'finance') loadFinance();
        if(t === 'claims') loadClaims();
    }
</script>
</body>
</html>
