<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBL | Bharat Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon: #ff6b00; --bg: #020406; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .brand-font { font-family: 'Syncopate', sans-serif; text-transform: uppercase; }
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; }
        .input-node { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 14px; border-radius: 12px; width: 100%; outline: none; font-size: 11px; color: white; margin-bottom: 10px; }
        .tab-btn { opacity: 0.4; transition: 0.3s; padding-bottom: 10px; font-size: 10px; font-weight: 900; text-transform: uppercase; border-bottom: 2px solid transparent; }
        .tab-btn.active { opacity: 1; color: var(--neon); border-bottom: 2px solid var(--neon); }
        .a-section { display: none; }
        .a-section.active { display: block; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-6">

    <div id="admin-auth" class="fixed inset-0 bg-black z-[3000] flex items-center justify-center p-6 text-center">
        <div class="glass p-10 w-full max-w-sm border-orange-500/20">
            <h2 class="brand-font text-orange-500 text-sm mb-8 italic">Bharat Master Access</h2>
            <input type="password" id="adm-pass" placeholder="Security Key" class="input-node text-center mb-6">
            <button onclick="checkAdm()" class="w-full bg-orange-600 py-4 rounded-xl font-black uppercase text-[10px] tracking-widest shadow-2xl">Authorize Node</button>
        </div>
    </div>

    <div id="admin-main" class="hidden">
        <header class="flex justify-between items-center mb-8">
            <h1 class="brand-font text-orange-500 italic text-lg leading-none">Bharat Control</h1>
            <button onclick="location.reload()" class="text-[8px] opacity-30 font-black uppercase italic underline">Refresh Hub</button>
        </header>

        <nav class="flex gap-6 mb-8 border-b border-white/5 overflow-x-auto pb-1">
            <button onclick="aTab('matches')" class="tab-btn active" id="btn-matches">Matches</button>
            <button onclick="aTab('finance')" class="tab-btn" id="btn-finance">Finances</button>
            <button onclick="aTab('claims')" class="tab-btn" id="btn-claims">Claims</button>
        </nav>

        <div id="sec-matches" class="a-section active">
            <div class="glass p-6 mb-8 border-orange-500/20">
                <h3 class="text-[9px] font-black opacity-30 uppercase mb-4 tracking-widest">Create Tournament</h3>
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="m-t" placeholder="Title" class="input-node">
                    <input type="number" id="m-f" placeholder="Fee (₹)" class="input-node">
                    <input type="number" id="m-p" placeholder="Prize (₹)" class="input-node">
                    <input type="text" id="m-i" placeholder="Banner URL" class="input-node">
                    <button onclick="createM()" class="col-span-2 bg-green-600 py-4 rounded-xl font-black uppercase text-[10px] italic">Launch Match</button>
                </div>
            </div>
            <div id="admin-m-list" class="space-y-4"></div>
        </div>

        <div id="sec-finance" class="a-section">
            <div class="space-y-8">
                <div>
                    <h3 class="brand-font text-[9px] text-green-500 mb-4 italic">Pending Deposits (Add Cash)</h3>
                    <div id="deposit-box" class="space-y-3"></div>
                </div>
                <hr class="border-white/5">
                <div>
                    <h3 class="brand-font text-[9px] text-red-500 mb-4 italic">Pending Payouts (Withdraw)</h3>
                    <div id="withdraw-box" class="space-y-3"></div>
                </div>
            </div>
        </div>

        <div id="sec-claims" class="a-section">
            <div id="claims-box" class="space-y-6"></div>
        </div>
    </div>

<script>
    // --- BHARAT SERVER CONFIG ---
    const firebaseConfig = { 
        apiKey: "AIzaSyDlHxa8FJHVTXKF5U1UMobZMY_Rw7G12fw", 
        authDomain: "tournament-app-b77c0.firebaseapp.com",
        projectId: "tournament-app-b77c0",
        storageBucket: "tournament-app-b77c0.appspot.com",
        messagingSenderId: "383562657313",
        appId: "1:383562657313:web:9b97b102a90102" 
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function checkAdm() {
        // Default Pass: admin@123
        if(document.getElementById('adm-pass').value === "admin@123") {
            document.getElementById('admin-auth').classList.add('hidden');
            document.getElementById('admin-main').classList.remove('hidden');
            loadAdmMatches();
        } else { alert("Access Denied!"); }
    }

    // --- MATCH MANAGEMENT ---
    async function createM() {
        const title = document.getElementById('m-t').value;
        const fee = document.getElementById('m-f').value;
        const prize = document.getElementById('m-p').value;
        const img = document.getElementById('m-i').value;
        if(!title || !fee) return alert("Fill data!");
        await db.collection('matches').add({ 
            title, fee: Number(fee), prizePool: Number(prize), img, createdAt: Date.now(), roomId: '', roomPass: '' 
        });
        alert("Published to Bharat Server!");
        location.reload();
    }

    function loadAdmMatches() {
        db.collection('matches').orderBy('createdAt', 'desc').onSnapshot(snap => {
            const list = document.getElementById('admin-m-list'); list.innerHTML = "";
            snap.forEach(doc => {
                const m = doc.data(); const id = doc.id;
                list.innerHTML += `
                <div class="glass p-5 border border-white/5">
                    <div class="flex justify-between mb-4">
                        <h4 class="font-black text-[10px] uppercase text-orange-500">${m.title}</h4>
                        <button onclick="deleteM('${id}')" class="text-red-500 text-xs">🗑️</button>
                    </div>
                    <div class="grid grid-cols-2 gap-2 mb-3">
                        <input type="text" id="rid-${id}" placeholder="Room ID" value="${m.roomId || ''}" class="input-node mb-0">
                        <input type="text" id="rps-${id}" placeholder="Pass" value="${m.roomPass || ''}" class="input-node mb-0">
                    </div>
                    <button onclick="updateRoom('${id}')" class="w-full bg-white/5 py-2 rounded-lg text-[9px] font-black uppercase border border-white/10 italic">Update Room Details</button>
                </div>`;
            });
        });
    }

    async function updateRoom(id) {
        const rid = document.getElementById('rid-' + id).value;
        const rps = document.getElementById('rps-' + id).value;
        await db.collection('matches').doc(id).update({ roomId: rid, roomPass: rps });
        alert("Sync Complete!");
    }

    async function deleteM(id) { if(confirm("Delete Match?")) await db.collection('matches').doc(id).delete(); }

    // --- FINANCE MANAGEMENT ---
    function loadFinance() {
        // Load Deposits (Add Cash)
        db.collection('deposits').where('status', '==', 'Pending').onSnapshot(snap => {
            const box = document.getElementById('deposit-box'); box.innerHTML = "";
            if(snap.empty) box.innerHTML = "<p class='opacity-20 text-[10px]'>No pending deposits</p>";
            snap.forEach(doc => {
                const d = doc.data();
                box.innerHTML += `
                <div class="glass p-4 border-green-500/20 flex justify-between items-center">
                    <div><p class="text-[11px] font-black text-green-500">₹${d.amount}</p><p class="text-[7px] opacity-30 uppercase">${d.uid.slice(0,10)}</p></div>
                    <div class="flex gap-2">
                        <button onclick="approveDep('${doc.id}','${d.uid}',${d.amount})" class="bg-green-600 px-4 py-2 rounded text-[9px] font-black uppercase">Approve</button>
                        <button onclick="rejectDep('${doc.id}')" class="bg-red-600/20 text-red-500 px-4 py-2 rounded text-[9px] font-black uppercase">Reject</button>
                    </div>
                </div>`;
            });
        });

        // Load Payouts (Withdraw)
        db.collection('payouts').where('status', '==', 'Pending').onSnapshot(snap => {
            const box = document.getElementById('withdraw-box'); box.innerHTML = "";
            if(snap.empty) box.innerHTML = "<p class='opacity-20 text-[10px]'>No pending withdrawals</p>";
            snap.forEach(doc => {
                const w = doc.data();
                box.innerHTML += `
                <div class="glass p-4 border-red-500/20 flex justify-between items-center">
                    <div><p class="text-[11px] font-black text-red-500">₹${w.amount}</p><p class="text-[8px] text-blue-400">${w.upi}</p></div>
                    <div class="flex gap-2">
                        <button onclick="approvePayout('${doc.id}','${w.uid}',${w.amount})" class="bg-green-600 px-4 py-2 rounded text-[9px] font-black uppercase">Paid</button>
                        <button onclick="rejectPayout('${doc.id}')" class="bg-red-600/20 text-red-500 px-4 py-2 rounded text-[9px] font-black uppercase">Reject</button>
                    </div>
                </div>`;
            });
        });
    }

    async function approveDep(docId, uid, amt) {
        const uRef = db.collection('users').doc(uid);
        await db.runTransaction(async (t) => {
            const uDoc = await t.get(uRef);
            const newBal = (uDoc.data().wallet || 0) + amt;
            t.update(uRef, { wallet: newBal });
            t.update(db.collection('deposits').doc(docId), { status: 'Approved' });
        });
        alert("Money Credited!");
    }

    async function approvePayout(docId, uid, amt) {
        const uRef = db.collection('users').doc(uid);
        await db.runTransaction(async (t) => {
            const uDoc = await t.get(uRef);
            const newBal = (uDoc.data().wallet || 0) - amt;
            t.update(uRef, { wallet: newBal });
            t.update(db.collection('payouts').doc(docId), { status: 'Completed' });
        });
        alert("Marked as Paid!");
    }

    async function rejectDep(id) { await db.collection('deposits').doc(id).update({status:'Rejected'}); alert("Rejected"); }
    async function rejectPayout(id) { await db.collection('payouts').doc(id).update({status:'Rejected'}); alert("Rejected"); }

    // --- CLAIMS MANAGEMENT ---
    function loadClaims() {
        const box = document.getElementById('claims-box');
        db.collectionGroup('participants').where('status', '==', 'Claimed').onSnapshot(snap => {
            box.innerHTML = "";
            if(snap.empty) box.innerHTML = "<p class='opacity-20 text-[10px] text-center py-10'>No claims to review</p>";
            snap.forEach(doc => {
                const p = doc.data(); const pId = doc.id; const mRef = doc.ref.parent.parent;
                box.innerHTML += `
                <div class="glass p-5 border border-white/5">
                    <div class="flex justify-between mb-4">
                        <div><h4 class="text-xs font-black text-blue-400 uppercase italic">${p.username || 'Player'}</h4><p class="text-[8px] opacity-30 mt-1 uppercase">UID: ${pId.slice(0,8)}</p></div>
                        <a href="${p.proofImg}" target="_blank" class="text-orange-500 font-black text-[9px] uppercase italic">View SS ↗</a>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="verifyWin('${mRef.id}','${pId}')" class="w-full bg-green-600 py-3 rounded-xl text-[9px] font-black uppercase italic">Approve</button>
                        <button onclick="rejectWin('${mRef.id}','${pId}')" class="w-full bg-red-600/20 text-red-500 py-3 rounded-xl text-[9px] font-black uppercase italic">Reject</button>
                    </div>
                </div>`;
            });
        });
    }

    async function verifyWin(mId, pId) {
        await db.collection('matches').doc(mId).collection('participants').doc(pId).update({ status: 'Verified' });
        alert("Win Confirmed!");
    }
    async function rejectWin(mId, pId) {
        await db.collection('matches').doc(mId).collection('participants').doc(pId).update({ status: 'Rejected' });
        alert("Rejected!");
    }

    // TABS
    function aTab(t) {
        document.querySelectorAll('.a-section').forEach(s => s.classList.remove('active'));
        document.getElementById('sec-' + t).classList.add('active');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + t).classList.add('active');
        if(t === 'finance') loadFinance();
        if(t === 'claims') loadClaims();
    }
</script>
</body>
</html>
