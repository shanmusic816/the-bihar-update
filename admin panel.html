<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBL Admin | Master Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.7.1/firebase-app-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.7.1/firebase-firestore-compat.min.js"></script>
    <style>
        :root { --bg: #05070a; --blue: #3b82f6; }
        body { background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        input, select { background: #000 !important; border: 1px solid #333 !important; color: white !important; outline: none; }
        .neon-border { border: 1px solid var(--blue); box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="pb-20">
    <div id="auth-screen" class="fixed inset-0 z-[500] bg-[#05070a] flex items-center justify-center p-6 text-center">
        <div class="glass p-8 rounded-[2.5rem] w-full max-w-md neon-border text-white">
            <h2 class="text-3xl font-bold mb-8 text-blue-400 italic tracking-tighter uppercase">Master Terminal</h2>
            <input type="password" id="admin-pass-input" placeholder="Admin Password" class="w-full p-4 rounded-2xl text-center mb-4 bg-black">
            <button onclick="checkPass()" class="w-full bg-blue-600 py-4 rounded-2xl font-bold uppercase tracking-widest hover:bg-blue-500 transition-all">Unlock Terminal</button>
        </div>
    </div>

    <div id="admin-main" class="hidden text-white">
        <header class="p-6 glass sticky top-0 z-50 flex justify-between items-center border-b border-white/5">
            <h1 class="text-2xl font-bold text-blue-400 italic">BBL CONTROL</h1>
            <button onclick="logout()" class="text-red-500 text-xs font-bold border border-red-500/20 px-4 py-2 rounded-full uppercase">Logout</button>
        </header>

        <main class="p-6 max-w-6xl mx-auto space-y-8">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-bold uppercase italic text-white/80">Tournament Manager</h2>
                <button onclick="document.getElementById('m-modal').classList.remove('hidden')" class="bg-blue-600 px-6 py-2 rounded-xl text-xs font-bold uppercase tracking-widest shadow-lg shadow-blue-500/20">+ Create Match</button>
            </div>
            <div id="match-container" class="grid lg:grid-cols-2 gap-6"></div>
        </main>
    </div>
        <div id="players-modal" class="fixed inset-0 z-[120] bg-black/95 hidden flex items-center justify-center p-6">
        <div class="glass w-full max-w-sm p-6 rounded-3xl border border-white/10 text-white">
            <h3 class="text-lg font-bold text-blue-400 mb-4 uppercase italic">Joined Players</h3>
            <div id="player-names-list" class="space-y-2 text-sm max-h-60 overflow-y-auto pr-2"></div>
            <button onclick="document.getElementById('players-modal').classList.add('hidden')" class="w-full mt-6 text-white/20 text-[10px] font-bold uppercase tracking-widest">Close Panel</button>
        </div>
    </div>

    <div id="result-modal" class="fixed inset-0 z-[600] bg-black/98 hidden flex flex-col p-6 overflow-y-auto text-white">
        <div class="max-w-4xl mx-auto w-full pb-20">
            <div class="flex justify-between items-center mb-10 sticky top-0 bg-black/80 backdrop-blur py-4 border-b border-white/5">
                <h3 id="res-title" class="text-2xl font-bold text-orange-500 italic uppercase">Leaderboard Editor</h3>
                <button onclick="document.getElementById('result-modal').classList.add('hidden')" class="bg-white/10 p-3 rounded-full text-[10px] font-bold">CLOSE X</button>
            </div>
            <div id="player-edit-list" class="space-y-4"></div>
        </div>
    </div>

    <div id="m-modal" class="fixed inset-0 z-[110] bg-black/95 hidden flex items-center justify-center p-6 text-white text-center">
        <div class="glass w-full max-w-md p-8 rounded-[2.5rem] border border-blue-500/30 space-y-4">
            <h3 class="text-xl font-bold text-blue-400 italic uppercase">Match Setup</h3>
            <input type="text" id="m-title" placeholder="Match Title" class="w-full p-3 rounded-xl bg-black border border-white/10">
            <input type="text" id="m-img" placeholder="Poster URL (Direct Link)" class="w-full p-3 rounded-xl bg-black border border-white/10">
            <div class="grid grid-cols-2 gap-3">
                <input type="number" id="m-entry" placeholder="Fee (₹)" class="p-3 rounded-xl bg-black border border-white/10 text-sm">
                <input type="number" id="m-prize" placeholder="Prize (₹)" class="p-3 rounded-xl bg-black border border-white/10 text-sm">
            </div>
            <input type="datetime-local" id="m-time" class="w-full p-3 rounded-xl bg-black border border-white/10 text-white/50">
            <button onclick="saveMatch()" class="w-full bg-blue-600 py-4 rounded-2xl font-bold uppercase tracking-widest shadow-lg">Publish Match</button>
            <button onclick="document.getElementById('m-modal').classList.add('hidden')" class="w-full text-white/20 text-[10px] font-bold uppercase tracking-widest mt-2">Cancel</button>
        </div>
    </div>
    <script>
    const firebaseConfig = { apiKey: "AIzaSyDiHxA8fXHVTAKFSU1UMobZMY_Kw7612fw", authDomain: "tournament-app-b77c0.firebaseapp.com", projectId: "tournament-app-b77c0", storageBucket: "tournament-app-b77c0.firebasestorage.app", messagingSenderId: "925200484535", appId: "1:925200484535:web:c15c87fcecb5e793bca532" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function checkPass() { if(document.getElementById('admin-pass-input').value === "admin@123") { document.getElementById('auth-screen').style.display='none'; document.getElementById('admin-main').classList.remove('hidden'); loadMatches(); } else { alert("Wrong Password!"); } }

    function saveMatch() {
        const data = { title: document.getElementById('m-title').value, img: document.getElementById('m-img').value, entryFee: Number(document.getElementById('m-entry').value), prizePool: Number(document.getElementById('m-prize').value), startTime: document.getElementById('m-time').value, status: 'Upcoming', createdAt: Date.now() };
        db.collection('matches').add(data).then(() => location.reload());
    }

    function loadMatches() {
        db.collection('matches').orderBy('createdAt', 'desc').onSnapshot(snap => {
            const container = document.getElementById('match-container'); container.innerHTML = '';
            snap.forEach(doc => {
                const m = doc.data(); const mId = doc.id;
                container.innerHTML += `
                    <div class="glass p-6 rounded-[2.5rem] border-l-4 border-blue-500 mb-4 text-white">
                        <div class="flex justify-between items-start mb-4">
                            <h4 class="font-bold uppercase italic text-lg tracking-tighter">${m.title}</h4>
                            <select onchange="db.collection('matches').doc('${mId}').update({status:this.value})" class="text-[9px] p-2 rounded-xl font-bold uppercase bg-black border border-white/10">
                                <option ${m.status==='Upcoming'?'selected':''}>Upcoming</option>
                                <option ${m.status==='Live'?'selected':''}>Live</option>
                                <option ${m.status==='Finished'?'selected':''}>Finished</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-3 mb-5">
                            <input type="text" placeholder="Room ID" value="${m.roomId||''}" onchange="db.collection('matches').doc('${mId}').update({roomId:this.value})" class="p-3 text-xs rounded-xl bg-black border border-white/5">
                            <input type="text" placeholder="Password" value="${m.roomPass||''}" onchange="db.collection('matches').doc('${mId}').update({roomPass:this.value})" class="p-3 text-xs rounded-xl bg-black border border-white/5">
                        </div>
                        <div class="flex flex-col gap-2">
                            <div class="flex gap-2">
                                <button onclick="fetchPlayers('${mId}')" class="flex-1 bg-white/5 py-3 rounded-xl text-[9px] font-bold uppercase border border-white/5 tracking-widest">View Players</button>
                                <button onclick="openResultManager('${mId}', '${m.title}')" class="flex-1 bg-orange-600/20 text-orange-500 py-3 rounded-xl text-[9px] font-bold uppercase border border-orange-500/10 tracking-widest">Update Result</button>
                            </div>
                            <button onclick="db.collection('matches').doc('${mId}').delete()" class="w-full py-2 text-red-500 glass rounded-xl text-[8px] font-bold uppercase opacity-30 hover:opacity-100 transition-all">Delete Tournament</button>
                        </div>
                    </div>`;
            });
        });
    }

    async function fetchPlayers(id) {
        const list = document.getElementById('player-names-list');
        list.innerHTML = '<p class="text-center py-4 text-xs opacity-50 uppercase tracking-widest animate-pulse">Syncing Warriors...</p>';
        document.getElementById('players-modal').classList.remove('hidden');
        const players = await db.collection('matches').doc(id).collection('participants').get();
        list.innerHTML = players.empty ? '<p class="text-center py-4 text-xs opacity-20 uppercase font-bold">No entries yet</p>' : '';
        players.forEach(p => {
            list.innerHTML += `<div class="p-3 glass rounded-xl flex justify-between items-center mb-2 border border-white/5"><span class="text-xs font-bold uppercase tracking-tight">${p.data().gameUid}</span><span class="text-[7px] text-blue-500 font-bold uppercase border border-blue-500/30 px-2 py-1 rounded-full">Joined</span></div>`;
        });
    }

    async function openResultManager(mId, title) {
        document.getElementById('res-title').innerText = title + " Rankings"; 
        document.getElementById('result-modal').classList.remove('hidden');
        db.collection('matches').doc(mId).collection('participants').onSnapshot(snap => {
            const list = document.getElementById('player-edit-list'); list.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data(); const uId = doc.id;
                list.innerHTML += `
                    <div class="glass p-5 rounded-[2.5rem] flex items-center justify-between border border-white/5 text-white">
                        <h4 class="text-xs font-bold uppercase italic text-blue-400 w-1/3 break-all tracking-tighter">${p.gameUid}</h4>
                        <div class="flex gap-4">
                            <div class="text-center"><p class="text-[7px] text-white/30 uppercase mb-1 font-bold">Rank</p>
                                <input type="number" id="rank-${uId}" value="${p.rank||0}" placeholder="Rank" class="w-14 p-2 text-center text-xs rounded-xl bg-black border border-orange-500/20 text-orange-500 font-bold outline-none">
                            </div>
                            <div class="text-center"><p class="text-[7px] text-white/30 uppercase mb-1 font-bold">Kills</p>
                                <input type="number" id="kills-${uId}" value="${p.kills||0}" placeholder="Kills" class="w-14 p-2 text-center text-xs rounded-xl bg-black border border-orange-500/20 text-orange-500 font-bold outline-none">
                            </div>
                        </div>
                        <button onclick="setStats('${mId}', '${uId}')" class="bg-green-600/20 text-green-500 px-6 py-3 rounded-xl text-[9px] font-bold uppercase border border-green-500/10">Set</button>
                    </div>`;
            });
        });
    }

    async function setStats(mId, uId) {
        const r = Number(document.getElementById(`rank-${uId}`).value);
        const k = Number(document.getElementById(`kills-${uId}`).value);
        await db.collection('matches').doc(mId).collection('participants').doc(uId).update({ rank: r, kills: k, status: 'Verified' });
        alert("Ranking Locked for " + uId);
    }

    function logout() { localStorage.removeItem('admin_session'); location.reload(); }
</script>
</body>
</html>
