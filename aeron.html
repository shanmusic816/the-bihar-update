<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aeron AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>

<body class="bg-[#212121] text-gray-100 font-sans">

<div class="flex h-screen">

<!-- Sidebar -->

<aside class="w-64 bg-[#171717] p-4 hidden md:flex flex-col">

<button onclick="newChat()"
class="flex items-center gap-3 border border-gray-600 rounded-lg p-3 hover:bg-[#2f2f2f]">

<i class="fa-solid fa-plus text-sm"></i>
<span class="text-sm font-medium">New Chat</span>

</button>

<div id="history"
class="mt-6 space-y-2 overflow-y-auto flex-1"></div>

<div class="text-xs text-gray-500 pt-4">
Built by Shan
</div>

</aside>

<!-- Main -->

<main class="flex-1 flex flex-col">

<!-- Header -->

<header class="flex items-center justify-between px-6 py-4 border-b border-gray-700 bg-[#171717]">

<div class="flex items-center gap-3">

<div class="w-9 h-9 rounded-xl bg-gradient-to-r from-purple-500 to-teal-400 flex items-center justify-center font-bold text-sm">
AI
</div>

<div class="flex flex-col leading-tight">
<span class="font-semibold text-sm tracking-wide">Aeron AI</span>
<span class="text-xs text-gray-400">Built by Shan</span>
</div>

</div>

</header>

<!-- Chat -->

<div id="chat"
class="flex-1 overflow-y-auto p-6 space-y-6">

<div class="flex gap-4 max-w-3xl mx-auto">

<div class="w-8 h-8 rounded-full bg-teal-600 flex items-center justify-center text-xs">
AI
</div>

<div>Hello! Main Aeron AI hoon. Main aapki kaise madad kar sakta hoon?</div>

</div>

</div>

<!-- Input -->

<div class="p-6 border-t border-gray-700">

<div class="max-w-3xl mx-auto relative">

<textarea id="msg"

class="w-full bg-[#2f2f2f] border border-gray-600 rounded-2xl p-4 pr-12 focus:outline-none resize-none"

placeholder="Ask Aeron AI..."

rows="1"></textarea>

<button onclick="sendMessage()"

class="absolute right-3 bottom-3 p-2 bg-gradient-to-r from-purple-500 to-teal-400 text-white rounded-lg hover:opacity-90">

<i class="fa-solid fa-arrow-up"></i>

</button>

</div>

</div>

</main>

</div>

<script>

let chats = []

let currentChat = []

function newChat(){

if(currentChat.length > 0){

chats.push(currentChat)

renderHistory()

}

currentChat = []

document.getElementById("chat").innerHTML=""

}

function renderHistory(){

let history = document.getElementById("history")

history.innerHTML=""

chats.forEach((chat,i)=>{

let item=document.createElement("div")

item.className="text-sm p-2 hover:bg-[#2f2f2f] rounded cursor-pointer truncate"

item.innerText="Chat "+(i+1)

item.onclick=()=>loadChat(i)

history.appendChild(item)

})

}

function loadChat(i){

currentChat = chats[i]

let chatBox=document.getElementById("chat")

chatBox.innerHTML=""

currentChat.forEach(m=>{

addMessage(m.text,m.type,false)

})

}

function addMessage(text,type,save=true){

let chat=document.getElementById("chat")

let div=document.createElement("div")

if(type==="user"){

div.className="flex gap-4 max-w-3xl mx-auto flex-row-reverse"

div.innerHTML=`

<div class="w-8 h-8 rounded-full bg-purple-600 flex items-center justify-center text-xs">U</div>

<div class="bg-[#2f2f2f] p-3 rounded-2xl max-w-[80%]">${text}</div>

`

}

else{

div.className="flex gap-4 max-w-3xl mx-auto"

div.innerHTML=`

<div class="w-8 h-8 rounded-full bg-teal-600 flex items-center justify-center text-xs">AI</div>

<div>${text}</div>

`

}

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

if(save){

currentChat.push({text,type})

}

}

async function sendMessage(){

let input=document.getElementById("msg")

let message=input.value.trim()

if(message==="") return

addMessage(message,"user")

input.value=""

try{

let res=await fetch("/api/chat",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

message:message

})

})

let data=await res.json()

let reply=data.choices[0].message.content

addMessage(reply,"ai")

}

catch{

addMessage("AI server error","ai")

}

}

document.getElementById("msg").addEventListener("keypress",function(e){

if(e.key==="Enter"){

e.preventDefault()

sendMessage()

}

})

</script>

</body>
</html>
