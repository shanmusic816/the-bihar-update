<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aeron AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>

<body class="bg-[#212121] text-gray-100 font-sans">

<div class="flex h-screen">

<!-- Sidebar -->

<aside class="w-64 bg-[#171717] p-4 hidden md:flex flex-col">

<button onclick="clearChat()" class="flex items-center justify-start gap-3 border border-gray-600 rounded-lg p-3 hover:bg-[#2f2f2f] transition">
<i class="fa-solid fa-plus text-sm"></i>
<span class="text-sm font-medium">New Chat</span>
</button>

<div class="mt-8 flex-1 overflow-y-auto">
<p class="text-xs text-gray-500 font-bold mb-4">AERON AI</p>
</div>

<div class="text-xs text-gray-500">
Built by Shan
</div>

</aside>

<!-- Main -->

<main class="flex-1 flex flex-col relative">

<header class="md:hidden p-4 border-b border-gray-700 flex justify-between items-center">
<h1 class="font-bold">Aeron AI</h1>
</header>

<!-- Chat Area -->

<div id="chat" class="flex-1 overflow-y-auto p-4 md:p-10 space-y-6">

<div class="flex gap-4 max-w-3xl mx-auto">
<div class="w-8 h-8 rounded-full bg-teal-600 flex items-center justify-center text-xs">AI</div>
<div class="flex-1">
<p>Hello! Main Aeron AI hoon. Aap kya puchna chahte ho?</p>
</div>
</div>

</div>

<!-- Input Area -->

<div class="p-4 md:p-10 bg-gradient-to-t from-[#212121] via-[#212121] to-transparent">

<div class="max-w-3xl mx-auto relative">

<textarea 
id="msg"
class="w-full bg-[#2f2f2f] border border-gray-600 rounded-2xl p-4 pr-12 focus:outline-none resize-none"
placeholder="Message Aeron AI..."
rows="1"
></textarea>

<button onclick="sendMessage()" class="absolute right-3 bottom-3 p-2 bg-white text-black rounded-lg hover:bg-gray-200 transition">
<i class="fa-solid fa-arrow-up"></i>
</button>

</div>

<p class="text-center text-xs text-gray-500 mt-3">
Aeron AI • Built by Shan
</p>

</div>

</main>

</div>

<script>

function clearChat(){
document.getElementById("chat").innerHTML=""
}

function addUser(text){

let chat=document.getElementById("chat")

let div=document.createElement("div")

div.className="flex gap-4 max-w-3xl mx-auto flex-row-reverse"

div.innerHTML=`
<div class="w-8 h-8 rounded-full bg-purple-600 flex items-center justify-center text-xs">U</div>
<div class="bg-[#2f2f2f] p-3 rounded-2xl max-w-[80%]">${text}</div>
`

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

function addAI(text){

let chat=document.getElementById("chat")

let div=document.createElement("div")

div.className="flex gap-4 max-w-3xl mx-auto"

div.innerHTML=`
<div class="w-8 h-8 rounded-full bg-teal-600 flex items-center justify-center text-xs">AI</div>
<div>${text}</div>
`

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

async function sendMessage(){

let input=document.getElementById("msg")

let message=input.value.trim()

if(message==="") return

addUser(message)

</script>

</body>
</html>
