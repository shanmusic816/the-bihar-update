<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aeron AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>

<body class="bg-[#212121] text-gray-100 font-sans">

<div class="flex h-screen">

<!-- Sidebar -->

<aside class="w-64 bg-[#171717] p-4 hidden md:flex flex-col">

<button onclick="clearChat()"
class="flex items-center gap-3 border border-gray-600 rounded-lg p-3 hover:bg-[#2f2f2f]">

<i class="fa-solid fa-plus text-sm"></i>
<span class="text-sm font-medium">New Chat</span>

</button>

<div class="mt-auto text-xs text-gray-500 pt-6">
Built by Shan
</div>

</aside>

<!-- Main -->

<main class="flex-1 flex flex-col">

<header class="flex items-center justify-between px-6 py-4 border-b border-gray-700 bg-[#171717]">

<div class="flex items-center gap-3">

<div class="w-8 h-8 rounded-lg bg-gradient-to-r from-purple-500 to-teal-400 flex items-center justify-center text-sm font-bold">
A
</div>

<div class="flex flex-col leading-tight">
<span class="font-semibold text-sm">Aeron AI</span>
<span class="text-xs text-gray-400">Built by Shan</span>
</div>

</div>

<div class="flex items-center gap-4 text-gray-400">

<i class="fa-solid fa-rotate-right cursor-pointer hover:text-white"></i>

<i class="fa-solid fa-gear cursor-pointer hover:text-white"></i>

</div>

</header>

<!-- Chat -->

<div id="chat"
class="flex-1 overflow-y-auto p-4 md:p-10 space-y-6">

<div class="flex gap-4 max-w-3xl mx-auto">

<div class="w-8 h-8 rounded-full bg-teal-600 flex items-center justify-center text-xs">
AI
</div>

<div>Hello! Main Aeron AI hoon. Puchiye kya help chahiye.</div>

</div>

</div>

<!-- Input -->

<div class="p-4 md:p-8 border-t border-gray-700">

<div class="max-w-3xl mx-auto flex gap-3">

<textarea id="msg"

class="flex-1 bg-[#2f2f2f] border border-gray-600 rounded-xl p-3 focus:outline-none resize-none"

placeholder="Message Aeron AI..."

rows="1"></textarea>

<button onclick="sendMessage()"

class="bg-white text-black px-4 rounded-lg">

<i class="fa-solid fa-arrow-up"></i>

</button>

</div>

</div>

</main>

</div>

<script>

function clearChat(){

document.getElementById("chat").innerHTML=""

}

function addUser(text){

let chat=document.getElementById("chat")

let div=document.createElement("div")

div.className="flex gap-4 max-w-3xl mx-auto flex-row-reverse"

div.innerHTML=`

<div class="w-8 h-8 rounded-full bg-purple-600 flex items-center justify-center text-xs">U</div>

<div class="bg-[#2f2f2f] p-3 rounded-xl max-w-[80%]">${text}</div>

`

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

function addAI(text){

let chat=document.getElementById("chat")

let div=document.createElement("div")

div.className="flex gap-4 max-w-3xl mx-auto"

div.innerHTML=`

<div class="w-8 h-8 rounded-full bg-teal-600 flex items-center justify-center text-xs">AI</div>

<div>${text}</div>

`

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

async function sendMessage(){

let input=document.getElementById("msg")

let message=input.value.trim()

if(message==="") return

addUser(message)

input.value=""

try{

let res=await fetch("/api/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:message
})

})

let data=await res.json()

let reply=data.choices[0].message.content

addAI(reply)

}

catch(error){

addAI("AI server error")

}

}

document.getElementById("msg").addEventListener("keypress",function(e){

if(e.key==="Enter"){

e.preventDefault()

sendMessage()

}

})

</script>

</body>
</html>
